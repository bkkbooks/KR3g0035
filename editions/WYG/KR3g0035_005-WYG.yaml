body:
  text: 星命溯源卷五類次鄭氏諸家觀星心傳口訣補遺論五星相生火宜獨居生星不宜重見如木生更不宜見炁木喜相生須要得時如秋木落陷水孛同生則木浮矣限行煞地加浮沉主水厄水計同居如是煞行限遇之亦然如根本髙固不可例論土星火羅夾生根本雖固失之太驟若守命主其貎非疾似疾加煞則疾顯揚惟金星喜土計夾生根本亦固但發遲遇生旺則髙水星宜金生但秀而欠實凡金水皆秀星不若火土木羅之盛也論五星相尅羅火尅金最凶加重煞則相殘盖飛亷陽刄為重也金不宜為飛亷陽刃羅火不宜為天雄地猬木不宜金尅若金為飛亷陽刃最凶他煞稍輕水不宜土尅强遏則水不順流加計則水遏矣或主氣滯婦人主月水不通火忌水尅加孛則凶土忌木尅加炁則重主疾限遇之主病難瘳或瘧疾加煞則經年不愈吉星喜相㑹或官福同宫或田財同宫不宜奴星與遷移主相㑹論五星守命木主慈清修近文加水則文章顯世安於巳或未或奎為最金性剛烈主燥不藏事得所則好義遇水則淫孛次之見炁孤梗水星多智巧無善星三方對照則性流無定遇孛則泛濫矣遇土同躔如水命人及坐命於水則沉晦如土為奴原無生旺禄貴宫而為大小耗天地耗併則為潜偷之人終身沉滯無能為土主厚重得局守信如在己雖破局或土命則星照本家或長生禄貴加臨皆作好論如壬寅壬申是也火羅助之其性不甚嚮快貌亦不揚土與計同宫其人執抝自是窒塞不通火得局好禮化耗則虚花使用主耗財若不得地則弄巧成拙加煞急燥主常生瘡痍或至於癩而夀不逺日喜金水同宫則人材好貌或能言日忌與羅同守命非足疾則目疾日遇孛前後皆不吉但後重於前亦主有疾或瞽或主傷親火猶甚但火主上孛或上或下月喜望夜或上下弦宜金火助之孛在後則好在前則不好月遇計則主目疾月與土同居亦與火日同論凡日宜晝不宜夜炁木亦然如木命木在午為青龍奉御如日生人坐四日度見於擁蔽日光則不吉凡紫炁守命皆主生鬚躔水土者多金度者少經云若太陰被火羅或金羅孛計夾又看太陰所生如何若坐星失次經乃謂身無主位貧賤夭折假如丁未生人太陰是刃主太陰在已火逼緊主瞽一目如太陰在寅只主目爛如三方對照爛後亦瞽夜火好禮晝土持重矮肥木主慈愛人必清秀金性剛不藏事遇火則滛亂妻宫加然則妻滛水木清秀如㑹文星或己亥學堂或奎井亥宫皆為文章之士夜火奎壁火命亦然金水伶俐三方咸池咸池或遇金孛主風流奴主髙則為樂人水土守命晦甚晝火坐命夜土切照亦然晝火暴怒夜土頑愚田財主尅命禄貴主生旺加臨主富惟官禄主不喜尅命則招官事三符㑹限或亡神禍事連綿限弱當受刑遷移主衝主徒流若限在前然在後亦有此患遷移尅破田財度主破家蕩産天馬地驛㑹木孛一生惹事招非天耗地耗切忌財鄉身命二主怕逢奴元福禄㑹則美天經地緯拱身拱命皆為上格只不宜居斗杓居官官不起亦貴命也飛亷陽刃忌見羅計非雷傷則當虎噬論煞星守命刃併天雄刼加地猬守星善則險處獲財限路危則亡生喪魄飛亷陽刃忌見羅計官符病符月符不宜重見見則有囹圄之患天耗地耗切忌財鄉官祿宫主忌見天雄天馬地驛㑹木孛一生惹是招非大小耗併盗刼辱身刼刃地猬遇妻星揚鞭再醮天雄白虎入官宫多招横禍天雄在命性必雄官元不宜尅命謂之官鬼羊刃在命性必横刼煞在命性必孤陽刃在命必有疾加天雄必破相炁羅相會亦主孤遷移主尅命主遷居或加煞限遇重則徒流輕則逺行如尅破田産度主弱主破家我去生他主晦限亦然為其泄氣故也奴僕主不宜守命主勞碌凡用星皆不宜見奴元金火不宜同途羅孛次之婦人金火守命則淫限遇則凶為其相戰水孛泛濫日月目之象亦親之象計羅近之則目有疾刃極重天雄地雌刼煞飛亷次之父母忌之亦然生煞皆不宜重見或生地坐命不宜行旺限老人遇之則死否則衰若乙亥人又是正月此水孛為刼主又是飛亷或五月十月是耗主况又亥火命人為煞太重不可為吉論婦人則主夭甲戌人亦然葢邜為刃亦夭男子忌之尤重如壬午癸未生人得孛在邜貴旺同臨此人必發五曜連珠或七政四餘不雜為貴但不宜背命五星聚天門命坐其間大貴亦不宜餘炁間之雖五曜連珠四餘七政不雜亦欲得所宜向東南不宜西北雖居離明不宜命背背命亦無甚貴如坐命在邜七政在南趨從必貴位至八座凡觀星勢皆宜諸星拱命不宜背命格髙命髙主富貴雖居暗地不可作下論或亥上安命惟己亥有星其餘皆無星亦貴大抵已上住命又不如亥上為妙論七政躔次喜忌太陽為父在强宫金水引從與吉星㑹主父富貴在命宫則吉在財帛則父有財在兄弟則父失利在田宅則父富在男女則父平安得子力在奴僕則父勞碌或為奴在妻妾則主有好妻在疾厄父有疾在遷移則父出外為商在宫禄則父有名加吉星方可在福徳祖父有福在相貌則父平平有貎已上宫分太陽加臨金水拱夾得用日生則父大吉喜金水相見大妙土計亦可火入垣則可犯陽則不可忌木炁掩光羅主刻剝夜生人則輕故曰日從陽則吉太陽無輔名曰孤陽男子不得祖業女子外家必零落臨生之時父不在家見養金水在宫及夾拱者吉三方拱得吉星方可太陽如作煞主單行三方四正無衝激則作吉如太陽既是煞又㑹煞引從作黨極凶凡太陽忌煞夾若在一邊則好日月皆論中氣次以月為母如上下弦是煞則作煞論日月非中氣則看田宅宫太隂為母入强宫得經得所與吉星相㑹則母有力失經失所與凶星相㑹則尅母入命宫吉入財帛宫主有財入兄弟宫有情吉入田宅宫則主母有田宅入男女主先女後男吉入奴僕主勞碌起家必庶母生不然末胎入妻室主因親得妻入疾厄主有權有疾母灾多病入遷移則平平主過房出祖入官禄則貴盛入福徳則生平有福入相貎則母貌美坐咸池則母滛主有外心煞併凶忌見土計最凶火羅稍凶夜生猶可金木水相隨則吉夜生人最佳月上中旬生者有力下旬生者無力凡男女命太隂皆愛清貴及落在吉宫者妙論木星喜春令宜見水孛生之寅亥二宫吉未宫亦吉巳申二宫受生吉為人清秀慈善考之凡木在卯宫多利忌見金火秋冬皆失令加諸煞則凶與太陽交㑹吉必尅父戌卯二宫脱氣平平見土計子丑二宫怒見炁則餘奴主反孤論火星喜見木炁相生又不喜重見從陰則吉犯陽則凶夏令吉春令少吉獨行有權卯戌二宫吉申巳宫樂寅宫吉巳宫躔軫則受制躔翊為朱雀乘風夜生反吉有光明忌見水孛凶冬令不吉加羅火凶日生忌犯陽夜生則可躔辰酉為火入金鄉則早抛兄弟子丑二宫泄氣見金則怒論土星喜火羅相生亦不宜重見重見火羅則太驟一發反見禍子丑二宫吉夘戌二宫吉辰戌丑未月得令從太陽少吉日生反吉忌見木氣相尅加計則凶忌與太陽相見入寅申巳亥宫凶辰酉宫脱氣未宫曰三丘煞見水則怒論金星喜土計生之從陽則吉從陰亦吉秋得令喜辰酉宫吉未宫亦吉子丑宫受生見火羅凶午戌夘三宫凶又金乘火位其人少失尊親已申宫脱氣平平見孛用之則為花酒之客夏令無力寅亥上及見木炁則怒矣論水星喜金星相生入已申吉冬令吉從日月吉未子宫吉亥宫朝天稍吉土計凶見孛則餘奴犯主加煞非夭則刑丑宫少凶夘戌上怒見陽不妨寅宫脱氣四餘躔次喜忌論炁星主慈善出家好道坐命及三方對衝見之必孤妻子難為行限及三方對照見之此限必慈善要出家出此又改矣犯太陰為人晦滯近太陽則掩光遇劍鋒恐受傷如對照先雖有妻老年亦孤居子丑則怒居寅亥為奴犯主位不吉居夘戌則有生成之意居辰酉則衰居巳申受生吉居午凶加煞尅命度大凶論孛星此星居命詭怪萬端權謀不變有尅剝無禮制居子少吉居丑凶加煞尅命度大凶居亥朝天少吉居寅吉尾火上凶居戌凶主流落奎度反吉辰酉平平巳申為奴犯主位居未少吉居午大凶女人當頭尅夫害子孤淫是非隨太隂在未曰抱蟾單行生度吉剥雜尅度凶論羅星此星守命為人性躁暴居子午曰中分吉居己申受制小吉居子丑為生本宫坐命遇之為餘氣生命忌尅牛金凶敗夜生得用辰酉宮則怒凶居未主尅剥生灾多官事居邜戌為奴犯主位立命於此不吉行限遇惡星相生則為富不仁相尅則凶㑹金加飛亷則犯干戈及暴死㑹劍鋒非惡死則傷殘矣論計星居丑躔斗名曰朝斗必貴只宜獨行居子為頑土須用木炁制之方可或相衝照或三方相制亦可入寅遇金則吉入亥平平邜戌獨行吉辰酉吉巳申則怒未上凶午上平吉㑹劍鋒必傷殘及惡血死續論七政四餘分布宜忌及入格真偽一太陽照妻宫孤立者皆主夫妻年紀不等否則妨尅重婚一太隂正照妻宫皆主妻妾無貌不然亦非正禮而婚縁太隂有盈虧之不常也一太乙抱蟾常人見孛與月同行便謂之太乙抱蟾非也須是上弦及望前既望下弦在未上見之及生於戌亥子丑夜生者方合此格如非其地又非其時名為抱死鬼却不能為福矣一木羅㑹舍必在寅上為吉葢木喜羅樂之地二星相得為㑹舍在他宫則亂格不足為吉一火炁為職權在寅夘為大吉葢火廟於夘生於寅寅為炁之垣夘為炁之旺地二星相得故為職權不以晝夜為拘其他福必减半一木孛為符印在未為得局盖木升殿於未孛入廟於未二星得所方吉他宫其福减半一火羅孛計乃四凶曜化凶化吉並宜獨行則主重權一土星為災至緩主病淹滯難瘥使人晦懶作事有頭無尾或出一月其病方發一紫氣為灾比星尤緩一金星不要坐羊刃的刼煞之上葢金主殺遇煞則煞氣輝騰故為煞至重一計羅截㫁之格不宜太陽跳出犯此名為孤君逺遁君主無輔極為不美葢太陽乃君象只欲五曜輔佐吉星拱夾方為吉論若孤立於外主人一生奔波不得人力雖我附人人多逺之一羅計截㫁半天星此格有吉有凶或截在左行限在右或截在右行限在左名曰反背為限度不與諸星㑹遇故也又有升沉之不同或日生而諸曜當天截在邜辰巳午未申位而有星行限却從酉戌灾子丑寅位而無星者為不得體或夜生人截㫁諸星在酉戌亥子丑寅位行限又從邜辰巳午未申位無星之地皆為升沉不同並不合格此格當專論一星跳出在外者何如或為福星禄星財星命主或官星權星貴星爵星夀星夜火夜月晝木晝土皆為得格主人必有富貴福夀如跳出一星或是刑囚暗耗或奴僕主羊刃主刼煞主的煞主晝生而有漏出或火漏出或夜生而日裏星辰漏出者皆不合格主人貧苦勞碌處世無成皆不可為吉論一太隂逐月隨日而化金木水火土太隂屬水則不喜土月同躔如太隂屬木則不喜金月同躔餘可例推犯之皆帶疾妨尅如更在空亡亡神刼煞空亡之鄉者决主其人亂説是非言語不定一令星在太陽之前名為旺進若是命主在前為持進名曰令星拱日又曰令星當衡皆主權貴若命主及令星在太陽之後者名曰後進其福减半一諸星並行有前有後凡煞星則欲其前行主星則欲其後至且如水火同行水尅火為煞水在火前則為不尅火在水前則煞逼身最為大害不可不審經云煞前主後當膺藩輔之權煞後主前必有徒流之患此之謂也一諸星㑹聚有吉㑹在凶㑹吉㑹者如命主身主度主官魁福禄化貴權印䕃則為吉㑹雖是火羅計孛若作吉亦為吉㑹若為羊刃刼煞及化刑囚暗耗皆為凶㑹主禍一諸星並要分行善惡不可混雜故善者專為吉惡者專為凶經曰善惡不宜雜處吉凶要在分行此之謂也人命中或見福禄單行為吉若福刑相㑹禄耗並行吉星凶星皆主利名有成有敗處世無成一五星退行有退而有力者有退而無力者且如火金二星同行金在前火在後而退此煞星不敢進前以尅金是謂退而有力若金星退遇火順行反尅金星是謂退而無力余可例推一五星退行有退而升殿入垣逄生皆為有情反作吉論或退而坐煞逢煞及入惡弱之宫皆為無情决作凶論一退星為禍為福尤甚葢行遲故也經云星躔退度善惡分外有情看命者審之一諸星在命皆為所属既能為吉亦能為凶其論已載𤣥妙集中細看極有靈驗論十二宫守照活變看法一十二宫分皆要詳看先看其宫後看其主凡宫為祖􅁸星為巳且如田宅宫忌破空亡刼煞守之若􅁸星居髙無祖業自創成若宫好主􅁸不好雖有田宅而不能受用革故鼎新方可又看其生旺如何定其加减若五星本壞將餘氣代用者主屋宅不新亦不甚髙廣如妻主壞以四餘代用者主無正妻或重婚為子主壞者或非親子又看其主主􅁸逺近何如如加祿貴生旺則吉推此可例餘宫一十二宫中主星雖有定位然亦本主考之則釣􅁸飛來滿盤活潑潑的底昧者弗思捨本生而拘於星曜乃尋日月之夾拱福祿之貼照官魁之引從金水之秀麗木炁之慈善凡如此類便以為吉纔見金寅火酉木子土巳水戌及金乘火位火入金鄉木到大梁晝火夜土之類例排為凶殊不知一宫之星自有六七等議論隨其所躔斟酌重輕品藻淺深生成尅制有無窮妙用豈可以一言盡一途拘哉葢觀星者遇一命在目便是一公案在前必用明斷如快刀破竹無纎毫礙滯若胷中無有真見言無定力則言凶而慮其吉言吉而疑其凶糊塗不决皂白不分或有所學未至妄以敢斷自許至於隨指隨錯禍福無慿也必心𫝊有源識見無差議論如影響之答一時言之而不自覺方可為善斷也一五星隨宫用之則隨人盤論之亦如前法逐宫論之不可造次又看其得令則有力失令則無力又忌斷躔失躔與四餘相㑹加諸煞大凶亦可隨然而論之又推三方對衝相援則吉尅則大凶一凡論命之法先看立命何宫何度以宫為輕度主為重最怕外星來尅命者為忌或宫主尅度者為輕或加吉星反有名利之許又看三方對衝生尅者亦如此論宫主失躔生平减力度主失次者祖業難招若限強有力者主發財故曰命弱限強如枯苗之得雨此之謂也一凡看五星之法須是排定太陽以生時加在太陽度上則知安命在何宫方為端的須是以度主為要宫主次之葢宫主者州郡也度主者縣令也由縣而州縣為切近二主俱要逢生旺得時為妙凡身主切於命主度主切於宫主夜生人重身度主日生人重命度主經云身好命不好有福無夀命好身不好有夀無福一看命須是四正為𦂳或日月照四正或金木照四正福徳照四正及用星居四正之位皆是貴顯受用之人又有火羅計孛守四強及化得好者皆為合格若是刑囚暗耗等星居於四正宫中而逢刑傷尅制之星皆主破敗一看命弱暗之星則要其居䧟弱其明顯得用之星則欲其居髙強一看命不要星辰十分顯見如禄居禄位福守福宫金水夾日守命皆大顯名曰敷露不能大富大貴一看命務要求其主星命度命主身度身主須看強弱以論禍福不必主星一一髙強一一得地經云一星得用終為顯貴吉人又云使一星背而莫救其非縱羣曜吉而莫能為福又云一星加臨如此命永為吉慶譬如五七品官員在任必員員識面其中有一員得力則侍從州郡莫不刮目觀星當以理明推其次苐一看命好星辰俱善柔亦不能為大事業又要一凶星以助其權大凡吉星多凶星少則從吉論凶多吉少則從凶論貴人之命非權不能以治世一貴人之命多是䧟弱有不可觀者其中有一星得用坐煞得時及官禄有釣起吉星暗加其位者皆貴不然旁有吉星交照官宫及有吉星照八煞之宫皆貴一看諸星皆如看命之法亦看三合及正照方斷吉凶凡觀命先看命宫釣起飛來次看横衝直撞吉凶何如若田宅吉安享父業終身無灾官禄吉僕馬昌盛榮貴多財妻妾吉倡隨偕老昆仲和睦此乃五福全備之人倘此三位值凶星照破縱富貴亦不能安享經云四直之中最要相生而為妙正謂此也葢官宫與財帛奴僕同一局也田宅與相貎疾厄同一局也妻妾兄弟福徳同一局也一看命須是看時令為𦂳春木夏火秋金冬水四季土星須看旺相休囚死絶為要一看得命皆善日月明㓗方為吉論葢天地以日月為主若日月明净方為貴顯經云貴人日月要分明日月不明非貴人也一論命之法先起五寅元遁㸃至命宫看是何干支論經緯二星要𦂳再㸃至官禄是何干支次看天地人元禄主再㸔吉星分布局面相生相尅何如又看諸煞方布列之仔細詳推吉凶可判一論父母妻子皆用五寅元遁去凡命度主起輔在強吉之宫必富貴官祿主起輔陽者必主貴凡人亦宜近貴見官先生云凡厯頭諸凶曜自是人欠審一凡諸星入垣尅度者合大格局必貴遇限不好與諸煞併此處大凶凡吉星陷退者减力一半煞㑹陰陽者煞化為吉不妨大體只有灾火羅計孛只宜獨行若交㑹大凶隨宫忌之或相生得用有力為富不仁對衝三方四正或相遇主尅父母氣守命三方對照者必孤為僧為道相得者吉尅入者凶或行限之必好善出家遇此後限如舊論五命守命附一看立身立命何處宫度晝生人看命度主夜生人看身度主如上弦望前望後及下弦生者看命度為𦂳亦如命度之法一立命既定更看晝生人夜生人晝生人不要火金月孛羅照命夜生人不要土木日氣照命名曰五殘星皆主貧賤不然則多憂少樂生平成敗碌碌到老一晝生人則要太陽坐夘辰巳午未上方應朝陽向明之格如晝生而太陽坐申酉戌亥子丑之地皆非合格夜生則要太陰照命行限亦要火羅月孛當限方為得體一命坐祿坐貴坐庫長生駕殿夾貴人祿馬樞及蔭旺斗標卦氣之鄉皆主富貴否則亦主衣食豐足潭湛囦先生専取貴人祿馬只取用不同故官福星守命大吉卦氣印符生旺斗標祿馬難得兼全經云坐命㑹三星必主貴顯難得如此連鮮有合此格者一命主度主􅁸坐的殺刼殺羊刃主其人有害父母骨肉不全出祖破祖過房自立方免一命刼殺的殺羊刃暴敗空亡死絶三煞飛亷殺者皆主其人性不好心險行怪狼暴不仁衣食勞碌一事無成一命坐空亡及主星􅁸坐空或桃花帶馬者而又有炁孛金水照之皆主其人慷慨風流歌唱花月女人值之决主為娼一十干坐命且如六甲生人不要立命在金度上名曰鬼尅皆主勞碌不安只喜坐在生旺財帛宿之上坐水度名曰坐父母之上土度名曰坐財帛之上坐火度名脫局當以意恭詳得時得令為好其餘十干當效此推之凡守命要生星大妙如癸未八月初一日未時生斗上安命孛守以五虎遁從寅上遁起丑宫得乙孛是天元祿主大妙若是殺星専權終是不吉如壬申命五月二十午時生巳上坐命土守二煞又是官福二星木丑火酉三方經緯平生灑落只是性燥計水日在申四十五見水計暴亡平生殺數人一小兒命五月二十四子時戌上安命月守命金在午土在寅三方皆是殺飛亷羊刃四嵗瘟亡信乎殺之驗也夏仁七官連命四象俱全格丙戌二月夘宫坐命火午金酉土子共四千租白巖吴玉川丙戌二月子命坐女火土夾羅計截半天萬石租又如六丙六巳生人安命在申丙用金為正魁木為文魁官星己用金為文魁木為官魁星如六癸六庚生人安命在丑木為文魁金為官魁庚用木為正魁金為官星故詩曰丙巳相逢癸與庚隂陽磨竭兩宫亨官魁金木升晨殿白屋還應出監卿正謂此也六戌生人安命在午金為官在酉火為魁在邜六巳生人命在未金為魁在辰火為官在戌六癸生人命在已木為魁在寅水為官在申合此最竒庚申人安命在未坐玉堂火為官在午水為文魁在申入局拱命如己未生人命坐申上玉堂木為官主在未金為魁主在酉亦同如甲辰甲戌生人用太隂為文魁忌孛癸邜癸酉生人用太隂為正魁忌火盖甲辰甲戌納音屬火孛尅火故忌之癸邜癸酉納音屬金火尅金故忌之亥乃此辰垣廟之地天闗也如六乙生人安命在未月孛為禄主守命太隂入於邜崇勲之宫獨亥位無星此縱漏闗也如太隂在未命與孛在卯此横漏闗也生於夜者極清貴若乙巳乙亥生人不取以其衝破天闗故也又格身命在未木在卯縱漏闗也身命在夘木在未横漏闗也盖亥宫無星漏一木起来用事亦是一説此二星卯木二宫往来俱為得地所為合貴格也日從陽夜從隂如日生人寅午戌申子辰坐命以日土木水用事夜生安命巳酉丑亥卯未以月金火用事為福最厚若日從隂夜從陽則為背乃隂錯陽差為福最緩經曰三方若背其人空貴無官一安命煞前主後如已酉生安命在子木為煞星在亥居命之前土為命主居煞之後一前一後各得其地遇者冨貴可知餘倣此或命限之主釣起值煞星居前不能反尅者不以㐫㫁愚意此説未穏凡已生人子宫安命者以木為財福星果老以財福尅命為吉五星經亦云若還有用不為㐫權重凛威風二經皆不以木為忌此處獨言凶者恐亦未究財福尅命之説歟聊述鄙見以候知者一人命多有生時不定以子為亥以亥為子以初為末以末為初則坐度不同星辰轉動故曰言禍福不凖須是加减定其灾祥受生受尅方能言其吉凶經云一不可拘二須敢斷以禍福不應未可㨿言休咎必然之理大抵村落之人無譙樓更鼓又有晦𡨕風雨氣候不齊難以定時又有溺愛而明者聞人説此時為凶彼時為吉便以吉者為主故禍福不應推命者當意消詳詳之不可以誤傳誤自壞術法可也一夾命要日月夾命福祿夾命官魁夾命印貴夾命三合拱之者亦然皆主富貴或命度主身度主起坐别處而夾拱之者但無剥雜皆是大貴一刼殺的殺亡神羊刃之宫或吉星夾其上者其凶暴不可勝言致死於非命論財帛財帛一宫人生受用之大端也或福祿照財帛日月照財帛四財互垣身命二主臨財及財帛星又逢生旺得時得令皆是有財之人既有財則可以養妻育子求功名用奴僕若財主失經囚耗暗刑照財此是無受用之人若財帛不好亦未可遽言其貧又㸔田宅宫如何論兄弟兄弟之宫與福徳妻妾㑹為一局兄弟之分與吾本同一氣果老云命居閑極兄弟有争釁之風葢人與兄弟須是各安其分可也若命入兄弟我旺則尅彼彼怒則􅄷我故果老有争釁之論閑星入命者亦然惟田財官福入其宫者主兄弟豪富空亡的破入此主兄弟貧賤孤寡居之則孤雁獨行官符居之必逞訟刃雄居之則帶疾馬星入則兄弟東西咸池入則酒色迷戀又㸔宫主如何論田宅田宅之位人生受用之源或田宅主星不起或有福徳照臨田宅日月照身命主坐田宅亦作有財帛名望之人既有田宅則妻子功名皆自此出又一婦人田宅宫如刑囚暗耗坐其宫者并有要殺在上皆主破敗外家冷落兄弟無情大抵婦人最重田宅財帛二宫論男女水宫一數火宫二數木三金四土五加吉星則足其數加㐫星刑尅者必孤三方對衝稍輕若本宫及三方對宫相得者皆吉或尅或不尅皆隨星論之一男女宫坐禄馬貴人長生及有吉星照者皆主得貴子及孝順賢能之子更加有吉星三方對照者子宫必好如子坐劒殺的殺死絶之宫及無吉星照者皆不得好子併作無子斷一男女宫有羅計孛火刑囚暗耗者皆主其人多子婦人一年一産及老皆不得力如鷄抱鴨相似不然忤逆之男多出在外雖有若無一夜生太陽獨照男女宫而無星以輔之者主無子晝生而見獨月亦然惟有夜生水輔日在男女宫者反主有子以其孤陽不生孤隂不成故有此論又㸔其主星要𦂳只喜恩生男女主在强宫實地自然有子若有殺害空亡則减半力假如日生人太陰守男女宫男女主又飛起在弱宫或化直難星或落空亡多主無子夜生人太陰守之又看其男女星飛在强弱宫分輕重論如主星飛在强實之位則主損頭胎終還有子先女後生男之類如主星有落空强之地則主多生多尅如白虎六害華盖臨之流年旬中又空則可知其必無子也如男子主星及男女宫暫為流旬所空則只此十年無子過旬又計生子不可執一如男女主是我命之煞守陽刃煞六害奴僕白虎之宫則多生不肖之子如主星守天月二徳貴人及諸强宫與㤙星守則帛或男女主為㤙星者多生徳力賢貴之子而無疑矣男女數見首條如星坐實强宫各添一數論奴僕一身坐奴僕有吉有㐫貴人之格多是身人主入奴僕而貴者亦有入奴僕而賤者如奴僕宫主原是六馬貴人長生帝旺駕殿祿勲之地皆不可以奴僕論皆為國出力大貴之命如奴僕宫原是的殺羊刃亡神飛亷死絶暴敗之鄉而身命主又陷其上此是奔走服役奔波無成之人方以奴僕言之一奴僕不獨轄人貴賤勞逸亦主僕馬侍從本星坐於強旺之地更加吉星出之必主僕馬豐盛若主星弱奴星強反被奴僕欺害果老云主弱奴強奴僕有侵凌之患大扺以身命髙強為上也論夫妻一妻宫是禄貴長生帝旺之地皆主好妻及羙貌多能如妻宫是死絶的殺刼殺暴敗皆不得好妻更㑹孤寡惡宿必主無妻術家所云鼓盆星五行絶位是也㑹䘮弔二符計都必尅妻如妻星是殺星坐強坐實或殿駕或守田宅守財帛者主妻多做大規模欺凌夫主也古人以日為夫妻但年月日時多一干者為犯重婚故有兩甲兩妻之説五星專以妻妾宫主星㸔其空實弱強生尅之理以明之如是第宫主落空亡居弱地有的殺六害白虎加其宫分及臨其主所守之地者必多尅害如妻星化直難坐咸池的殺同宫必多産厄而亡如妻星是太隂坐未或在午或入兄弟宫多主因親致親或姨兄弟為之或妻星单坐華盖及陽刃我命宫坐白虎者則多與妻不和隔角之類如妻星落陷若得餘氣有力必有小妻偕老又如妻星坐咸池與兄弟主奴僕主同宫又有的殺驛馬夾之者則主其妻與外人及奴僕通情者極驗不可不信婦人尅夫亦以兄弟宫主星依次條㫁之萬不失一論疾厄八煞之宫非特主人疾厄亦主人一生操權若權星印星福星禄星居之皆主其人有重權虚實經云身命入八煞官禄少年湏早發若還八殺入命来疾病纒身那可脫一㸔帶疾先看命度身度受尅否又起煞坐煞與不坐煞更看疾厄宫主有何星坐其上如八宫有火羅計孛刑囚暗耗諸㐫併會其上者皆主重疾如疾厄宫無生而三方對照有凶星交照者皆主帶疾論遷移一遊行坐驛馬主人過房出祖坐長生馬者有四方之志遊行遇吉星出入見貴扶持㑹惡煞浮沉則飄蕩亡歸也或小限入遷移者亦主動論官禄一官禄不要煞星尅其宫名曰官鬼如官禄在亥却不宜金星入内亦不宜三合四正宫值之皆主其人徤訟不然遭官破家亦主其人無官食禄之分諸宫皆倣此看官禄宫不宜財星生旺守照及犯天雄羊刃惡星主人貪財壞名亦不喜官星尅命經云官禄尅命以名立身以名喪身更不喜十宫逢羅主人粗豪徤訟論福徳一看命須先看福徳為要葢人生處世以福為最有福則以立妻子立名利致富貴福徳既虧前數者未見其可得也福宫者人生之主若福禄居福身主命主入福又有日月照福徳權貴蔭印諸星照福金水夾月居福皆是有福之人為人性必端厚量必寛洪仁慈處世無尅薄之患亦主有夀可以定人之性情每試累騐若同土計生福徳者其人必寡言語性沉重若福徳有刑囚耗星居其上者其人必是尅薄之徒兇狼之輩大寛小急不仁不義之流心多奸偽言不忠信詭譎欺詐之徒奸謀機巧之輩未見其為有福如福徳無好星又看三方對照有何星照之如三合對照守照俱無未便言其吉凶更看財帛何如以消詳之一福徳官禄二宫最要吉星臨照之如日月居官福福禄居官福水日金月各居官福行限遇之皆發福如福禄二宫無星守照或釣起有吉星暗加其上者亦吉又㸔三合對照之宫以斷休咎未嘗官福二宫無吉星照臨是為富貴之人如官福二宫原本無宫主又恐釣起對照又無星辰一生虚花無成可知凡㸔命以福徳田宅財帛三宫為重若俱無吉星便不可以為福只是尋常碌碌命斷之論相貌金星獨行相貌清秀温潤木星瘦長清爽水星眼目俊火星日生則面紫黑夜生則紅白土星肥白長大夜生則矮黑孛星則額角骨露日生長大好顔色夜生顴骨露而細小羅㬋頭額濶大骨格粗多鬍鬚計長大面骨粗露夜則身小而眼露炁星好相貌多髭太隂温潤肥白夜黑小太陽日生黑色赤夜生清白爽氣凡看相貌如命裏有星須看先入者斷之若命與相貌皆有星亦依術斷之及三合對照推之主星起㑹刑囚暗煞主破相暗疾不然雕花刺文之軰論女命女命以對宫夫星為主看夫星起在何宫得位得所或吉星坐之或從陽三方對照加吉星者必嫁好夫可隨人盤逐宫推看入官禄得地主有貴夫人福徳主夫有福入財帛主夫有財入兄弟主見棄相嫌恐與兄弟有情入田宅主夫有業入男女主有子息入奴僕主勞碌喜為庖厨或與僕通入七宫或因親而成入疾厄主夫有疾入遷移主夫逺出離祖入相貌主夫有貌入命宫與吉星加臨得用相生冨貴雙全又㸔得經失經如何或加煞或加四餘逐宫推㸔恐三方對照吉㐫如何不可槩論須㸔坐命度主宫主起在何方皆一細推十二宫宫主星有用與否一女命必看身主如何女人最要身清吉不可駁雜金水相從太隂則吉逄惡星則㐫又看人盤得所不可執論逐宫推之則可忌三方血刃加㳫計羅照命或沓在刃宫或守照必主血氣疾亡大忌飛刃逄交破凡丁已生人太隂以作刃主論逢飛亷大㐫次看福主如何福主失經入弱宫必無福入強宫得所生平有福一婦人命坐驛馬又帶水孛照命照身或在五弱之宫主其人滛奔其與男子同斷一婦人不宜太陽坐命照命加以身強皆主欺夫奪權性急有男子之志一娼妓之命必犯桃花計孛金孛水孛福徳必不好夫星必陷夫宫必駁雜相貌宫必好男女宫必傷犯惡星一凡婦人天馬地驛守命者滛一婦人忌四餘主旺皆主重婚月孛當頭伶俐太過尅夫害子猶有醜聲多滛下賤若命坐咸池者必滛行限遇之滛而凶土孛滛穢金炁無擇水火滛而刑火土孤孀或男女星陷而得地又當生貴子而有好稱呼也星命溯源卷五
