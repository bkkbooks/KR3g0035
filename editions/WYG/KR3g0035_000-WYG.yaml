body:
  text: 星命溯源術數類五命書相書之屬提要臣等謹案星命溯源五卷不著編輯者名氏第一卷為通元遺書雜録唐張果之說凡三篇第二卷為果憕問答稱明李憕遇張果所口授凡四篇第三卷為元妙經觧稱張果撰元鄭希誠註第四卷為觀星要訣第五卷為觀星心傳口訣補遺均不云誰作詳其題詞似要訣為鄭希誠編補遺又術士掇拾增希誠所未備也考明皇雜録載果多神怪之迹不言其知禄命獨是編以五星推命之學依托于果術者遂以果老五星自名一家考韓愈作李虚中墓誌稱其推命尚止用年月日不用時則開元天寳之間且無八字似不應有五星然王充論衡稱天施氣而衆星布精天所施氣而衆星之氣在其中矣人禀氣而生含氣而長得貴則貴得賤則賤貴或秩有髙下富或貲有多少皆星位尊卑大小之所授也是漢末巳以星位言禄命又韓愈三星行云我生之辰月宿南斗牛奮其角箕張其口杜牧自作墓誌銘曰余生于角星昴畢于角為第八宫曰病厄宫亦曰八殺宫土星在焉火星繼木星王楊晞曰木在張于角為第十一福徳宫木為福徳大君子救其旁無虞也余曰自湖守不週歳遷舍人木還福于角足矣土火還死于角宜哉是唐時實以五星宫度推休咎其托名于果亦有所因爾希誠自署其官曰主簿其籍曰瑞安其號曰滄洲始末未詳憕自稱中都人其遇果在嘉靖二年九月尤怪妄不足辨總之術家務神其說而已然世所傳五星之書以此為鼻祖别有所謂果老星宗者葢因此本而廣之其後又有天官五星術與此頗異據理而論化氣當從天官正氣當從果老二家之術可互㕘其論星度乘除生尅及兼取值年神煞亦未可盡廢也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
