body:
  text: 星命溯源卷二果憕問答通𤣥先生評人生禀賦分金論先生曰賢愚壽天豈今日為然太上之世號曰洪荒而人也固有壽夭焉盖拘于氣禀之始而不知氣禀之所以終前輩袁天綱號為善知天文象緯曽㑹諸星宿于竺羅察禍福猶病鳶魚及得予㫖方知專用宫主為非度主為是初又以宫主度主互用在命或三方者用之於宫主遂專用宫主騐之愈疎先生曰開元間李憕期我於衡廬果命氣禀并木犴行限屢周天度今左旋于亢昨夜火逼金龍太白今午合退于辰必有大難我當化象太乙以􅓙之言未巳明皇果召試之飲以毒酒三杯醺然若醉先生曰非佳酒也頃之齒皆焦黒果以所執鐵如意撃之皆落假寐少時齒復生時神其事李憕再拜受教問曰福禄拱夾其命必貴耶必富耶先生曰是淳風小兒之誣言也五星六曜資我者吉傷我者凶亦隨嵗而變乎因取王勃命視之勃命坐翼水退朝陽于軫木作援炁又滋培奎璧之次故其人秀而善屬文以名立身以名敗身水為禄主故也金曜朝斗限行井木犴對照受傷羅孛一鋒一刃互争勝負是年屬丁陽刄又臨惡死無疑子其待之後果溺死二十九嵗憕又引天綱集曰一生侘傺對官怕逢羅火先生曰是得其說而不知其所以說假如子言倘我命坐寳瓶女之次火羅旺午豈非福乎惟其躔星日馬怕逢火羅對躔所以為禍也火命人乃是自星照本家反為吉論女壬申生人值之不夭則貧困人也餘凖此例先生曰煽熾怕傷金位此天綱之言也假使我命火必不為忌適楊國忠丑時生子命坐酉夘火羅兩夾一為天雄煞一為刄星又是咸池之地憕舉問先生曰昨夜客曜犯金女此火羅之驗也是子之夀不出今日果其夜不收國忠神之請詳已命先生曰是命泊處雖得卦氣身元坐刃而刃反起逼命位吾知其富且貴者以度主禄主起從陽於福徳宫而釣起又生本元然貴則貴矣苐未保其令終也李憕曰請問所以先生作色曰後自知之天寳間果為亂軍所殺先生曰火纒酉夘天綱指為火燒牛角火命人不為忌何也葢火即我也我燒牛角乃我勢盛何傷賦曰火入金鄉此命早抛兄弟火命不為忌其餘木子土巳金寅水戌皆可準此例先生曰日火也月水也四日度坐命晝生忌火羅是也前已定矣四月度坐命夜生怕土計亦同此例因指張巡命示之曰彼命坐心月狐命限到張度計屬刃星迫於前土為劍鋒逼於後使其背行稍可否則徃來交鬭能脱此乎時方貴盛先生曰貴盛可勝天乎天寳末嵗刃煞復隨流計加沓必死兵下後果死禄山兵下先生曰爾知有令星乎當時者旺我生者相生我者休尅我者囚我尅者死且如木旺於春七十二日休于夏七十二日死於秋七十二日相于冬七十二日囚于季月中節推此可見其餘星皆不離生尅制化若聞天綱語乎且如安命四土宫旺度火羅臨福尤昌熾弔起飛居垣廟縱逢木炁不為忌彼既令旺相此鬼縱在側不為忌矣因閲天綱集有曰爍爍陽光火勢不忌娟娟蟾影土計為妨四火懼見漂流四木怕逢金健四金坐度惟怕炎火四土何則為忌强梁之木要得金剛四水何則為防壅遏之勢要得木􅀈音乂夀甄迦羅限度邐行而無滯福阿僧祇命源妥安而有氣甄迦羅阿僧祇比西竺國語數無量限之説張果其得西竺之語歟刃併天雄守星善則險處獲財限路危則亡生喪魄刼加地猬或劍鋒身命兩危必惡死大小耗併盗刼身辱死在囹圄加金孛風流喪身不併不可概論曰敢問四木先生曰角斗奎井是四木躔度遇金曜健則木危矣木既危則剥床以膚我其免於患乎若此安命必壞祖破家縱木得地亦須先破而後成曰請問四火先生曰舉一隅何必三隅四火宜木盛木炁强則夀堅福壯木氣弱而火躔得所只是清淡之士火入弱失經失次只為貧賤之人四土四水四金皆准此論憕再拜謝曰命之矣先生袖出天圖指示曰爾命軫水為主計攻水於奎天綱謂水漂白羊水勢盛復梗於計計雖強又困扵奎木倘得金在奎從水必發但金起逺故只為清貧之士四十七嵗限行參水必不在人世憕曰何也土躔參水限度已壞矣餘可凖此例此數意當與前數通先生曰世人得袁公㫖皆以行限視度之休危假如命度角木到軫為吉翼為㓙竊氣故也殊不知當生水星壯旺則吉否則危倘翼火起弱亦不能竊我之木矣先生曰禄主朝陽斯命必貴而又未可滯此例度主朝陽亦貴本元弱矣縱朝陽何補先生坐大覺寺一般塞示以金剛命以塑日為主先生不視却之忽爐中風蕩火星墮地先生起而言曰此寺不久人間浹旬灰于燹火憕曰先生因金剛而知之乎曰否適火星自爐中下先生曰金剛命亦可試矣憕請課其命限行虚日羅辰火申照破日䑕曰得非命乎是人命亦惡死憕請所以先生曰今年天雄在子陽刃在午餘可準此例李憕曰人貌醜姸何以知之曰刃在命必有病加天雄必破相淳風曰木在命其人必長軀加氣則多鬚此不足信先生曰汝知天綱之語乎刼刃難遇妻羅揚鞭再醮或命坐空亡妻宫為羅所傷嗣空天雄及孛㑹皆主孤尅嗣主受傷餘氣健必有繼子然又看三方對照何如不可概論先生因示以一行僧命安寅宫坐孤刼木起同炁從身在申妻位水為妻元失經又坐在刃水妻主也此所以清孤憕曰然近貴何也曰身坐斗杓又是注受之地但禄主退逺此所以近貴不得爵位只為名僧耳李憕試一人命命坐夘宫氐土度金守照金為飛亷主星何以能延曰爾乃專于局見而不知甲辰火命人豈有懼于飛亷金乎若木命人的不能延今限行井木飛符病符月宫符同守照又加流星火煞一家大煞正戌二巳三午四未五寅六夘七辰八亥九子十丑十一申十二酉順行與止前大戾月宫符正月午二月未順數十二月至巳上為得無官災乎問之此人已在囹圄之中矣先生曰晝生太陽此命火羅夾拱火又為陽刃煞星羅􅀈鋒刃不早喪父亦主偏盲憕問曰何也曰日是父也月是母也亦目之象夜生主太陰忌主亦如之見土是羊刃先生曰慈心敬順善曜居命位之鄉獰然凶頑惡星纒命位之旁陽刃在命性必横加天雄者性必雄唯官星忌之官禄主忌㑹天雄先生曰六甲之例古未有也軒轅時大撓所定五行納音古無有也顓帝時洪範所究四七星宿古未之有天綱屬諸星象而知之古人惟齊七政四曜何得同叅七政猶人中之君子也四曜乃餘氣耳李憕請問餘氣先生指星璣之語曰水之餘孛也水之餘炁也火之餘羅也土之餘計也寧五星犯餘氣莫餘氣犯五星禍患尤大先生曰汝知孤寡命乎曰敢請先生指示殊愉命曰此命格局善然妻宫在亥金在巳妻宫壞矣惟木得垣妻雖有而不免鼓盆之歎餘皆凖此例先生曰子知萬乘主乎萬乘主與下貴不侔必夾拱隂陽必五曜連珠令大唐天子乙酉命其年五星環拱天門日月分躔危璧命坐室宿觀之憕看果然先生曰限至角木蛟則危矣繼而曰角木雖危必有離宫之厄翼火不出矣憕問所從孛壞翼大蛇角之四度對照戌宫之金五曜連珠金婁水壁從陽木火土輔太陽今限行氐土貉李林甫當國事可知矣先生論泰階憕問曰淳風晝火夜土忌曜之說可得聞乎先生曰四火懼見漂流四火坐命則忌水得土為之援曜如四土坐命則忌木得火益滋土勢如土曜謂之忌曜曜為我度主飛起朝陽又謂之忌曜可乎先生言畢拂袂長嘯而去莫知所終李憕記是語而編之目曰禀賦分金謂之分金者别人生貴賤也後學融㑹此理應如符劵以决人之休咎也至寳論昔時大仙觀命觀星皆非泛論人之命賦稟天地造化之樞機故曰天命果老大仙夜觀星象曰論五行以為指要而成其文能易曉也且論天經地緯夾拱不離者為貴有甲寅生人亥宫立命木在子水居戍命躔璧度坐天門之上此是經緯夾拱今為商賈之人何也果老聞之一哂而言曰子知其一不知其二此水木分明經緯然也斯命坐於刼殺水漂白羊之宫木入齊瓶之地何況水木乃我所用水為田宅之主曜来傷才帛木為官禄之用星又損相貌水木又為宫度之主得用受損入格局破何以槩論若使水子木戍非此論也經緯之理餘氣可用有辛夘生人命宫立命木在寅金在辰木為天馬金為地驛二星得用入垣夾拱得地此為上格不尅不生不破此為中格拱来破局失垣為下格值斗杓指破者是也又問斗杓之地立身安命為富貴之良也有戊寅生人正月巳時酉上安命坐斗柄之中乃一寒儒平生不富不貴何也果老曰然寒儒之格也居於敗地破碎地耗守命得斗杓為聰明文筆之士若欲富貴科名俟之皓首無矣有甲戌十月丑時生又寅宫立命值斗杓兼禄貴長生得局入格為上格貴命無貴禄守命有生旺亦為中格有刼刄耗煞相刑則為下格嫌值經緯破局又問唐符國印二星守身命為竒有丙辰生人安命在丑月在子唐符在身國印二星在命不富不貴何也荅曰甲寅旬中空亡之地土空則崩何富貴之有又問隂注陽受身命值之則可化㓙為吉更兼吉星乃是利名之人也有庚辰生人四月夘時酉土坐命坐注受之地犯刑而死者何也荅曰此金為羊刃之煞又值咸池居于命宫甲戌旬中無申酉將何為美豈不為酒色而害己亡身也又問卦氣在身命宫者主榮反為執鞭墜凳之人何也曰可詳騐之若非刼刃雄雌拱夾命位亦是天耗地耗守照身宫要知用此為榮則與斗杓相似又問天馬地驛吉㓙何以叅詳答曰居垣入廟則吉遇貴禄者為最妙得長生旺相者尤竒嫌值空亡不宜天耗地耗休囚死絶又忌戰衝刑尅又問天地人三元禍福何以取用答曰或為官禄之星或㑹命度之主或遇田財㑹此之間皆美當看十干變曜又看入垣升殿且如三元皆㑹官福則為貴格㑹田財則是富翁㑹度主滿用尤竒中間駁雜必細推詳又問官禄主朝陽者何如答曰格局髙強更兼官禄朝陽則為大貴若命元弱度主朝陽又何補焉經曰官禄朝陽必富貴安身傍母必尊榮又問壽元星照本家何以取斷答曰夀元星居于命位宜臨禄貴生旺之方方為吉論不雜者尤妙五星先天口訣先天心法者老仙有先天之機觀人之命而得於心其驗如神故謂先天心法不可輕以傳人也推命之術必在乎精先觀主曜次察身宫以二十八宿為經用十一曜為用尊莫尊於日月美莫美於官福貴賤論煞貧富論財賢愚識其髙卑夀天觀其元氣此先天之大要更有口訣具列於後且如命泊尾十度至箕七度以火水二星為主其一木同水入軫月居井日居昂火入尾箕度兼夜生此則一品之命也得此者主人呼吸若雷身長大性剛强有威權四柱中有寅辰二字謂之龍吟虎嘯此人更生天地之心好山水之鄉非凡之命也其次二曜朝陽一星伴月二品之命也其三火入奎樓金水㑹翌軫太乙抱蟾兼以命主逢生身主得垣福禄不背皆二品至五品之命也其四土火坐斗牛長庚朝斗水日坐天門月到金牛木臨箕壁金水朝陽夜火逢陽於虚五品至雜流也此上皆有功名之命其五合前等星或命度主或官禄主受傷或身命不髙田財有好星拱夾皆巨富之命也其六身命稍入局水木入命宮醫卜之人也其七羅星入命刑煞坐髙者武臣之命也其八炁照身命妻子官禄俱背或命主入三宫皆僧道之命也其九身守遷移主居三六過房之命也其十主在前煞居後身命受尅八宫有惡星皆賤疾之人也其十一女人命須身宫清夫宫净水星入垣子星好大富家婆之命也其十二身宫陷子宫陷夫宫陷水孛入命者娼妓之命也其十三又兼炁照身命夫星受傷子星被尅師尼之命也其十四身入遷移孛羅計守命夫宮受制三嫁不休之命也此先天之法論命如鑒照形得此者寳之幸勿亂傳後天口訣老仙曰我之與世遇無他葢時變人輕不可與傳仙道惟汝淳愿質朴可傳憕曰仙道不願學也但星命之中願聞一二足矣仙曰論命以斗杓卦氣唐符國印天雄地雌為主世俗術士尚不能曉何以知命夫斗杓者北斗之柄也卦氣者天禄之餘也唐符者直年之星也國印者朝廷之印也天雄者乾象也地雌者坤象也如帝王命合局無斗杓不能致一人之位官貴命無卦氣則安可食禄武官唐符不得地難握重權正印國印值空亡到任而死常人命中皆有天雄地雌空亡的煞天地二耗此人上無片瓦下無頓錐之地所以最為要𦂳也憕曰願聞水死兵亡蛇傷虎噬或縊死雷傷何以知之老仙曰又有刼殺亡神驛馬貴人破碎貫索桃花浮沉羊刃皆要用也且如命主星身宫逢水孛八煞宫值浮沉羊刃又逢流年水孛必主溺水死或身命坐羊刃金火與命主同度必主兵亡巳酉丑生人安命寅宫限逢計孛必主虎咬子午卯酉生人已宫安命蛇頭開口限行鬼井度逢火羅又云火孛蛇咬可斷八煞犯貫索身命𢃄勾絞限遇火金主縊死命坐天厄火入八宫限行箕風鬼金度觜火度必主雷傷憕曰自幼從師未嘗有此竒訣敢問婦人出處去就何以取斷老仙曰福徳好身宫清夫宫帶禄相貌好后妃之命也相貌稍偏亦夫人之命也相貌好夫宫雜又坐桃花之地娼妓命也或命主男女主同入夫宫羅星守命此則帶子重嫁或夫主男女主同入命宫入贅之象也憕曰敢問僧道命俱帶孤辰寡宿何以知其為僧為道之異老仙曰玉函經云問釋火宫辨别求𤣥水位叅詳盖僧命氣照身宫火居命位道家身居閑極水入命元並帶孤辰寡宿此其分也憕曰富貴貧賤盡知之矣窮通壽夭在行乎限願盡傳焉老仙曰此秘術不可轉傳於人以泄漏天機生則目盲死無棺也憕曰謹記仙曰世人都以官主論行限十不應一可哂可哂大扺行限先依量天尺上按定坐宫次依洞㣲大限行去專以生尅制化為窮通夀夭之别也假如斗角奎井安命以木為主行四水度或逢土或遇水孛大發迹也招廣財貴命得此必進職加官行心危畢張度上逢金亦好逢火發達逢土計喪服重重午日麻衣灾晦不盡行尾室觜翊度上不宜見金見金則有官灾破財或作土木造宅行虚房星昴度上平平無灾無禍行氐女胃栁度上無灾平坦發福逢水孛驟發逢金決死行牛亢婁鬼大上大㓙遇孛反主大發決因禍而致福不宜見金見金則死矣又如亢婁鬼牛度上安命以金為主行四土度大發行四日度平平吉凶相半必有大凶得貴人扶也行四月四水度見木則發見炁主孝服見火莫登髙步險行四木度遇火羅決死有水制之不妨行四大度見土計大發見火必死又如氐女胃栁安命以土為主行四日四火度發迹貴則加官否則納粟有官行四月四水度平平逢木炁則死見火主造宅置田行四金度平平行四木度大㓙遇水則死又如房虚昴星尾室觜翊安命並以火日為主忌行水度逢水則死行四木度大發行四水度見孛主落水死行四土度主孝服見火生男見金生女行四金度亦驟發又如心危畢張箕壁參軫安命並以水為主行四火度見土主跌死見四金稱意行四木度平平行四金度大發迹行四土度見計死見金亦好行四日度平平見羅主酒色之患或因婦人破財已上星度論其窮通壽夭如鏡照形不過以生尅制化而取也如本主行本度無福無灾水行水度火行火度前文不載也言畢老仙化為清風而去不知所終李憕于是筆而記之時維嘉靖二年九月朔旦中都石室山下李憕記問五十二數并論唐世朝臣及星芒見諸分野應安史之亂以其文語聱牙用事詭異故節之然談星之要實不外此術家有璧玉經耶律經厯象賦星家躔度歌亦太隂分金支分𣲖逺其實出乎此其間以私意臆說競為星家文字惑人不若此集要而簡予㳺湘潭交於術者得授是編他本因束諸髙閣暇日玩索故為之解云星命溯源卷二
