body:
  text: 星命溯源卷三通玄玄妙經解鄭希誠注釋排列出類五曜連珠二星合璧戴天履地出乾入巽文武兩班君臣慶會天地開明山澤通氣衆星朝北羣曜拱南居三隔三守一空一水火既濟風雷鼓舞縱關橫關關拱闔拱首尾隂陽居四正火羅計孛守四維分布得經申宫水土相會月繞崑崙火歸坤地酉宫金星助月月到金牛月升滄海戍宫土日合照火居婁宿日遇白羊亥宫日金水木金木乘旺金居衛分火孛驚天太乙朝天木計逢魚子宫水土朝北水清寶瓶土好齊瓶丑宫乙氣騎牛水愛逢金孛星朝斗土熒相會土好太常寅宫木計同寅木羅會舍卯宫太陽照􅊵火明天市日出扶桑辰宫金木逢龍水潤金明土羅相會金號太常水入鄭國木號角道已宫會水會蛇日水乘旺水臨雙女日月朝北午宫水陽相會日帝居陽太隂朝北水名榮顯未宫月挂栁梢金星助月太乙抱蟾木入秦州木孛同秦孛金相助金躔鬼宿星聚東井火號文昌朝拱輔夾向日曰朝三合曰拱身命主及諸強宫輔弼日月之前後曰輔日月夾身命主及諸強宫曰夾背對關迎衆星背躔曰背兩宫對照曰對對生者吉對尅者凶星辰在三合宫曰關照在後隔宫隔宿曰送在前曰迎強弱敗旺主星居官祿或福德田宅七強之宫曰強居五弱曰弱居子午卯酉沐浴曰敗居子午卯酉四旺曰旺又曰樂旺經曰日躔婁八至十三為正旺次旺胃一至七月正旺胃七至十一次旺至十三木正旺井二十九三十以至鬼三栁三樂于寅亥火正旺斗十八至牛初樂奎土正旺亢四至七樂危金正旺室七至十三樂胃水正旺子樂參月躔已見日金則樂日在己見金則樂羅正旺軫十二至十五次旺心昴樂箕計旺尾婁樂參昴旺室樂尾箕孛旺軫箕樂參危樂酉日喜神辰遇七強樂旺則吉遇弱敗則貧敗明晦升沉晝日明而月晦夜日晦而月明忌守命而或為主日在六陽位為過未則晦月在六隂位為明過丑則晦日木土晝明月金火羅夜明反是皆為晦日在東喜寅卯辰時生月在西喜酉戌亥時生皆曰升守命輔會得用則吉日在西則為沉日月卯時生人主夭惟在戌則為合地非謂沉也登殿入廟七政各有殿各有正廟偏廟惟主星及命坐此名曰登殿入廟最喜日月同向乃吾近君必取髙貴經云日正廟奎八至十三度月正廟婁八至十三度次廟畢九至畢一度木正廟角度火正廟心二至房三度次廟房四至心初度土正廟斗十五至二十一度金正廟亢五至九度水正廟翊八至十三度次廟星氣正廟奎十一至十五次廟觜牛孛正廟井十九至二十一次廟栁初至六度羅正廟星三度至五度計正廟軫十三至十六度次廟壁四至七度躔泄居嗔經云居垣而泄氣如土躔金木躔火水躔木火躔土之類如水逢木星木逢火星亦為泄論經云木打寶瓶水漂白羊此類皆名嗔也木在子怕逢金丑上泉枯牛壑嗔斗喜牛寅上金騎人馬嗔見火孛憂入水土走人馬斷躔計尾十四卯上金乘火位又怕逢水斷躔日月氐五氐辰上火入金鄉先嗔木至木觸金龍却嫌見火斷躔木亢二亢九孛角五已上水孛逢楚土埋雙女孛羅交戰午上金居日分火遇金計臨獅子孛騎獅子金火同周未上斷躔水流巨蟹井二十五酉上火燒牛角忌木嗔於胃六胃四畢三木到大梁斷躔羅畢三氣胃二十五昴二日月畢七戌上金忌白羊奎七婁二水乘火位又怕金逢斷躔奎七胃二孛奎十七胃一亥上木計火金斷躔奎十七胃二孛奎十七胃乙亥上木計火金斷躔羅壁七計屋十壁一土走雙女故曰居嗔失時得令春土夏金秋木冬火日火羅月夜土計木皆不得時及冬水孛寒冷不宜與月同躔背火羅者貧如正二太陽三四隂五六直符是火星七八水星九十木十一十二忌金利此皆是直符若同殺難守命度或守夾身度主夭得令者如春木夏火秋金冬水日陽夜隂日木土夜火羅俱喜為恩星生度逢生反刑居受生度或曰長生宫或恩宫與母星共宫或共度或對生亦宜並度此生我之星最喜合官星滿用或為科祿文魁等主星必貴反刑者如金與木反之類金躔奎木躔婁不得升殿如水火未濟亦然或日金主與刑星共宫度及對向亦然用殺疾貴命主是官祿科名為滿用星輔日入格而此星又是刃雄的劫符喪等殺必帶微疾而貴若不滿用者主天又主非命而亡經曰身命坐殺殺木為榮宜驗之尅殺全驚尅殺者如坐命金度見火而火尅金六辛六甲生人而火又為羊刃或併地殺則全驚畏者矣所云尅殺非我尅殺也尅於殺也官科祿順官祿科名主客天元祿主三者乃貴之原若得一星守命順行向我或生我或為身命之主滿用輔陽於命或關加對官者主貴分出奴黨氣孛羅計乃五星之奴不宜與身主度主及命主共經度此則小人犯主之象若得四餘皆獨立不雜於七政之間則美矣截轉用星官科祿三宿最為要用不喜背命背陽漏行于背宫則不能貴若得羅計前後欄截則不漏矣又主貴斷也讐閘根折尅我者為讐星忌隔斷與主同行如命坐翊火為主火躔亢水孛乃我之讎星躔于軫角而命火為其閘斷如木根被伐而折也夭喪必矣若火星躔逺在四宫及生旺之地不足慮也令助身明火羅本惡若夜生人喜近太隂而反得令能助身主之輝逢金水夾輔引從者亦然得此者主聰明富貴經曰夜生月而火羅侍衛者是也四吉夾輔天經地緯祿勳天福謂之四吉星只重二星夾命夾身不宜斗柄指破五耗皆臨天地耗大小耗及十干所化之耗併沓於命於身必主貧苦流耗與原耗併於限者必遭盜賊加流刃則遭官破經曰耗居二四必傷財未審驗否陽宅稽本經曰陽乃父居強旺及有吉星夾輔引從則崇父之基如坐命酉太陽又為田宅之主如日升殿左右金水夾之則可稽其父業豐厚尊貴若命宫主引太陽居間極並入弱宫父業必薄雄彗鋤名天雄地雌二星忌對衝官祿及孛衝官守官守命或夾或隔官祿科名之星必主鋤名削利七政並旺日月五星各得其所富貴之原也如日午月未水居巳申金居辰酉火居卯戌木居寅亥土居子丑是也四主咸屯身主命主度主夀元主四主於內為惡曜所夾所傷而或居陷弱失經必主貧夭彼此弱強如尅我之讐星既強盛而我衰弱全賴母子二星以援在本宫及對關加合以生以救故曰氣木太盛土計俱傷不有一火旺於離明恐福髙而身不能享者正此謂也前後凶寧讐難之星為凶恩貴之星為寧若得守命守身有凶有寧須分前後以辨之凶星在前背我在後曰向我背則不害向則必凶寧星在前曰背我在後曰向我背則不貴向則必榮參差星性七政四餘各有不同木主文而繁大主暴而往土主厚而遲愚金主剛而寡愛水主快而不定日配父加主星同主貴吉星引從則父貴經曰照命守身形容圓滿性溫和重言語逈異常人自幼不偏若孛會主勞瘵在官宫主貴在福宫一身安間在五宫獨行只一男兩星兩男三星三男月配母吉星引從則母賢婦人守月度無要星混雜則有貌男人值月守命喜與木德同行好容儀主文章藝術心慈無毒居官利官若無官有夀火乃子曜分晝夜面微黃眉踈言快氣豪面上小下大宜武職若晝生惡肌膚眼大損妻損財經營宰割之輩土主安靜為主守命主心地寬厚利陽宫晝生鼻大寡言多怪硬直有膽順行入廟榮貴金星主潔淨好容貌目秀眉疏面色紅白身不長聲響亮善音律多淫多技若照命臨身有武將之象又為妻星遇火羅則傷妻遇水合格有俊秀文章水星主文聰明智巧性情不定亦主溫柔可方可圓在樂宫利官若為吏亦利氣守命主性慈善言語分明坦易無妬善謹守少病有夀好佛老若近身星或主孤寡孛守命主言粗膽大有謀為多姦詐在未亥子主富大旺主尅子羅守命性格髙傲膽大不耐是非無妬心喜日生在陽宫樂旺地在隂宫主煎熬但男以金為妻宿而羅乃火餘能傷金若此星旺恐傷妻計守命性勇面如火膽大多姦吝喜居己戌忌夜坐在太隂宫則怒與他宫不同不一元辰論星以本為主坐生年支干所屬貴賤吉凶星辰各有不同如甲生人值大既是祿又是刃乙生人日乃文昌天厨惟卯時生者必富貴丙戌生人日是刃父早喪見木取貴丁生人以月為刃已生人月是身又是刃又作祿用戊生人土為祿主又是科名庚生人水為祿元金為刃星辛生人専以火為刃壬生人值計本惡而為祿癸生人值羅本惡亦為祿皆主有貴權爵榮住明匪賤明者髙明之地如卯上謂之明堂午上謂之軒轅戌上謂之武庫身命主星值此乃髙明之地也不可作下賤命論若貴人祿馬文昌斗杓八殺卦氣所臨之宫而命主身主值此亦為明宫也親駕須臣嵗殿嵗駕宫惟身命主居之此上又喜太陽臨之與我相親如君臣輔會於昭陽之象豈非為我之榮若升殿入廟居垣皆宜滿用輔會關係於命則貴身空害卸太陽好靜宜空喜獨行或在六甲空宮則殺神不害經曰太陽萬里明又曰月居間極始為祥如坐命刃旺逢空不畏官旺祿羸坐命天祿貴人唐符國印文昌卦氣斗杓八煞注受生旺等宫只宜納音生旺則貴避蛇踐虎行限凶送凶迎始脫刃的宫又值雄劍在前者死值雪加氷行限見原讎煞星本可畏又值流年讎煞併沓必死煞垣益損然星不起本垣者或在命宫損序已在三宫損序四宫損親五宫損子七宫損妻而後非為我讐反為我益又以煞居垣者見日月傷父母見妻子傷妻子之類皆以星為重而有益我之星又不以此論宿沓嶇平衆曜沓為一宫或沓一度而有相生相尅者故曰嶇平不一如月見火羅逢望則食逢晝則嶇逢夜生而未望者反能一助其光輝如火孛在亥則交戰此論星畓之多者亦宜詳考掌督善惡經曰凶星掌善惡是非富貴主遲吉曜作凶神敗亡更速如火羅計孛乃凶星也或生我或化為福祿居善宫未可便以凶宿論之而蚤嵗富貴者亦有之氣木金水乃善星也或尅我或化為刑囚居惡宫反以凶論故曰非凶之凶凶莫救也非吉之吉吉莫量也互換重輕經曰以輕易重富而貴貴而夀以重易輕苖不秀秀不實皆互換也琴堂有內外臺移東就西如主命居田入財財入命官入命命入官福守入命命守入福皆主富貴所謂以輕易重也又曰間極主入命宫命居間極總成空命入八殺須蚤發八殺入命患難脫身命主入奴僕縱坐吉星也勞碌奴僕若也入命來切忌小人相反覆所謂以重易輕也已上互換之説身命兼論為是母子側向生我者母星也我生者子星也母星解讐子星禦讐只冥近向於我或通關對合左右相顧則吉經曰母顧子子顧母福夀榮昌正謂此也或以月為母水為子者非子母之謂也向者向我性命也側者側面背行反去不顧之謂也體用屈伸命主曰體限主曰用經曰命弱限強如稿苗之得雨命強限弱如逆水之上灘順逆衰旺五星自北而西而南而東曰順行順則面向於前反是則逆逆則面反向後皆看身命之所在以辨諸星向背拱夾之宜與不冝不可槩以順者為帶臨官帝旺之位皆謂之旺凡衰病死絶胎墓之位皆謂之衰身命星及得用之星坐臨其位亦因之衰旺之名須是升殿居垣方不以衰旺論也掩蝕衝制羅計闌截即掩也日月遇朔望則食凡正朔之時刻忌生四月度雖無惡曜相關亦不祥若日月前後三日度內引從夾輔及三方對宫有吉星扶助者反主富貴不可槩以蝕論為不祥也對宫有尅星曰衝如木在丑金在未正對之類尅本命及身度之星曰制如金為命羅火制之月為身土計傷之之類若讐害之星得此衝制反吉分會引從羅計截諸星兩路如文東武西之類曰分諸星聚一宫一度如十一曜會聚身命官福田財有生無尅曰會在前曰引引宜度逺如日月引從之類在後曰從從宜度近如金水引從宜水前金後之類漏截守岐羅計攔截於身命宫之前後為截吉星因是而皆行於三宫六宫則漏而無力矣故曰漏則身命所住之位為守十二宫交界之地為岐凡身命坐度宜深不宜坐兩岐如命坐祿馬貴人地位之中又得吉星拱夾真大貴人也如坐兩岐多是𨽻卒之輩否則必是偏生庶出𢃄遷移祿馬乃過房出祖奔走勞碌人也若見有貴人坐兩岐者必時刻不定切宜詳究日月著明經曰尊莫尊於日月蓋日月者隂陽之精氣諸星之領袖晝生從日夜生從月必是日月分明吉星引從方是真格乃富貴之原也如日逢羅木氣臨獅子月逢計天乙趕月及諸殺星侵犯日月及日月居晦位皆非吉論雖或富貴亦不逺大故曰貴人之命看日月日月分明是貴人玉衡經曰晝生從日喜居六陽之宫夜生從月利見六陰之地果老云晝生日而金水從陽夜誕月而火羅侍衛合而參之可見日月不惟得地得時為明而又必以得引得從為明也七五賦云左右二殺月居中仍看三日宫玉衡經云三日逢刑總月地不能為福由是推之可見日月在命不惟本日本宫無殺星混雜為明而又以日之前後三度以月之經行四十度之前後無妨礙者為明也且日為君為父月為后為母身命官福近陽者貴日月夾身命夾官祿及陰陽拱命者皆得貴近君若有凶殺及四餘間於其間如君側之有讒人雖貴不久雖久亦不顯矣玉衡經云背太陽於父有憾背太隂於母有虧故身命二主向陽則得父力月明近命則有好母反是則不得於親必早年棄背若日月雖向命而又有凶殺犯之或晝月夜日或寒月孤陽父母雖好終是相失與反背者同福官清健經曰美莫美於福官蓋福星髙則平生有財有福而百事皆集無福則瓦解矣官星清則為官有名有譽而一身尊顯否則碌碌無成二星只要入命歸垣近陽得令升殿入廟無凶殺衝制方為發福入仕好命故曰文星不若福星髙又曰格局髙強不過官祿朝陽斯言盡之矣身命為元命主即坐命處二十八宿之所屬是也身主即月也及太陰所躔之度亦是也故星家有命度主身度主之辨不可徒以命宫之主為命主而月之所次之度主亦不可舍也果云身命得位福祿難量左右多情功名有準又曰宫主州也命主縣也莫不自縣而州愚常謂宫主猶人家也度主猶家之主也一宫之內大率有三等星度猶一家之中子父兄弟不同坐度之星猶家主一人獨掌家務則凡家人親友隨一人之好惡為親踈故度主是木則以水為恩以土為仇以金為殺若度主不是本則又有别樣好惡譬之家人之中人殊則情亦殊若只以一宫之主泛論禍福必無切驗故知諸家論宫主而不論度主者皆不若果老之説為親切體要也愚斷以果老書為經以諸家為緯以度主為先以宫主為次知所先後則近道矣身主諸家皆指為要緊而果老月兼身命及身度之主並用尤為關鍵故傷身劫盜果老極忌而對宫水映蟾光者必有異常之兆推此身主身度主豈可泛論歌曰世人未識星家理不務心傳務口耳生時坐度作虛名只把命宫星作主陰陽經緯何縱橫俗眼無由見終始諸宫皆可論宫辰命元切以度為主此是先生玄妙機須得髙賢方説與又歌曰夀夭榮枯惟看月張畢危心命尤切半夜之前喜獨行祿貴斗杓添皎潔雖是無光得位宜落木寒蟾非令節不關惡殺夀萱庭眼目光明雙鬢雪縱橫木孛漏關明尤是星家稱卓絶拱夾不起拱三方相向也夾命宫左右相輔也不起星躔本度也如火為命而火星即躔於命垣火度是也拱夾之星如日月福官經緯財田為吉又不宜餘星混之混則拱夾不専反無力矣若凶殺拱夾者其禍尤速原星不起非獨命元凡福官財田皆喜守照本宫本度又十干化曜福祿印貴權蔭之星夾拱者亦吉若暗耗刑囚拱夾亦凶釣起飛來對照拱照關照皆為釣起原守本宫本垣為之飛起吉釣則吉凶飛則凶此法惟流年星辰之為應拱衝直撞星盤南北為直撞東西為橫衝以相對相衝言之對吉則吉對凶則凶主流年流星為是身命官福財田妻子亦宜驗其對照休咎何如卦祿斗併卦氣曰卦祿宫曰祿斗杓曰斗此三者或併為一宫或併為一星或祿主居斗杓或斗杓指祿勳或祿入卦宫或卦入祿宮皆有係身命者主貴星命溯源卷三
