body:
  text: 星命溯源卷四鄭希誠觀星要訣余在江湖二十餘年訪求訣命之士甚多考藝多無實學與果老所傳大不侔矣其中間有可取條目及彷彿格局不曽該載凡例者今續附于后以俟叅用焉一排命先求星厯端正太隂晨昏起度不差若差之毫釐繆以千里取三方對照生尅帶貴帶殺若何夜生人重身度主要𦂳一觀命局面在乎變通假如四火為命或失經於水得木氣為援吉若水孛又髙於木氣展轉互相生亦可取用飛㢘守照遇星制伏則不為害諸星沉退一星滿用大貴一先看命度帶殺限度重併遇生星即死如庚戌八月生人安命室火木為刼土為浮沉火為劍鋒三十二嵗行斗木水中死一日干弱老年加殺必死且如丙丁日干年月時庚辛加酉運或庚辛年必死甲乙日干庚辛月時夾雖未老見庚辛必死此條論三命法一官禄星宜守照身命若化禄魁天地人三元大貴一恩主随身為富貴格假如坐四土火為恩與月同行又是夜生得令得時更遇生旺諸吉扶之為一二三品之貴如庚辰四月亥時女土泊命火炁月在畢行氐限輒登侍郎尚書最怕土退行縱有吉星為援亦終不吉一飛亷守命主夭湏看格局髙強有救有援命亦可延如丙子正月生人命泊尾孛守照土在命為援亦不為忌又如室火安命正月水為亷守照若值太陽或木土同宫反吉不為害若坐刼的刃行弱限必㐫格局髙不怕一八煞朝天假如戌亥安命金火獨守照得令得時為上格如泊命栁二三度及翊亢泊命者金火土兼為八煞主獨去占天門得所為上格一命坐刄不宜金守照加火羅愈惡夀不延長木命人不得其死逢空稍輕一流刄併天雄遇木炁為煞最重命坐四土或坐四月度者或原月與木氣同躔行限值刄炁有災家口不寧限雖不遇太隂逐月行宫遇此刄炁决主刑杖或墜跌之災丙辰刄氣在張行限見之多災流太隂遇之同日受杖八十予命在女炁月同度在亥丙辰年壬辰月戊寅日太隂值流炁流木又在角小限并刄值月宫符大限在氐值病符原炁三方切照氐八度忽髙樓跌下死一日不知人事炁月在刄值月宫又難子息一月煞飛亷最要看假如我命八月月煞在亥太嵗填實本嫌炁月同躔室度所喜炁生身度火與彼有情作事儘有方便未免亦有險撞一㸔命不拘晝夜須㸔太隂落在何度有無夾拱吉凶與命相叅取用又看本生日干化曜金木水火土加在月上與别曜有無尅制假如我命甲子日干甲巳土太隂即屬土不宜月炁同躔主有疾炁為財福又日生人稍輕行四月度主脾胃疾炁氣若帶殺瘧疾經年不愈脫限外方可一縊死必犯䦨干殺有甲戌生人栁土泊命土起亢羅守照一生發用五十七限脫鋒入刼自縊死又甲寅生人寅時軫水立命月起官禄參水四度十八嵗入張為生員縊死以亢參度數是欄干故也又如乙夘生人壁水立命日月夾水中道士官卑至六十二行夘末將入刄縊死何也葢宫大怒畢七原欄干煞起畢七與孛同道命水又是㢘刼主不宜夾拱亦主縊死不獨㸔欄干但諸殺併㳫夀元根基淺薄亦主横死一月帶刄不宜與火羅同躔主目有疾若在已上主耳聾火羅帶殺險火命人稍輕行井度與煞金同纒在翊或在别宫火逼𦂳亦主刑死且如己未生人二月九月又是未申宫泊命月是煞主最嫌與刑金同歩若得令先榮後刑又有丁丑二月生人金月在子火在午亥宫泊命金為兄弟帶煞行煞限被弟持刃殺死一寒月要隨陽日月同躔又是四月泊命更官福財田又好為上格一看官魁星要𦂳名利人根基既好更官魁在命或在官福在八煞獨行得令作顯官如甲壬生人炁月為官魁乙生人水日是也官魁例前為官後為魁甲命炁月乙水日丙羅羅丁計計戊孛火己火金庚金水辛木孛壬月炁癸土木一五星帶天雄羊刃近太陽主目疾四日泊命愈驗日守照亦然若日帶孤亷刃守照或遇殺星輔夾俱主夭一用星或命或官本弱得援星親切得所者為上一命坐孤刼有孤刼星守照者有命帶孤刼者不可一概論大抵身命帶從坐煞孤刼逄生必害六親各有輕重得失之分一命坐四金度圡對照金勢強假使金木同度或躔木宿者既尅為財主一生有財及至行限與金木同度决然不利因財致禍刑煞重併者者尤甚一看命度帶然與不帶煞起在何宫度與三方有無相戰方論吉㐫假使金為命度又是亷刃等煞或與火羅衝戰或與太隂同道決主重疾若帶孤刃亦主孤乏若帶煞升殿居垣更加三元㑹此皆是顯達上格餘皆倣此一八煞煞宫刄雄併或身命坐臨此宫或煞星臨照此宫皆主重疾八煞主守照得所主權貴一八字中諸刼刃併在年時上主疾否則天若諸吉貴禄注受斗杓符印在年日時上大吉貴如甲辰甲子甲申九月十一月注受禄馬生旺在寅寅時最好一火帶帶刃鋒行限遇之或太嵗加臨主血毒灾金帶鋒刃主喘肺中有疾一命坐刃鋒逢空加福官國印得力貴格一天元星最要𦂳或守命得令相資或是身命主聰明加生旺貴禄為竒主貴一行限見夫妻星又吉曜得令主有喜行度交送見之有吉有㐫生我者吉尅我者㐫如井木行室火為脫氣㐫一同年月日時之命出處不同何也想太隂交宫過度淺深先後有八刻之分假如前四刻月在心五度論太隂行事後四刻月到尾初論火取用各有不同况夜生人乃身度主為要因往推來可騐一三元最宜照官禄若安命在奎婁更天元星得令得地㑹官福必中進士狀元一身命坐空怕刃對照主夭行限見㓙星難過坐命對生時又遇殺守照夀不長一四金泊命主起煞宫盖煞氣太重命不乆長若福禄身好發用只宜引陽貴一冬令金水嚴凝若守照或是命度乃孤乏之人也遇太陽不妨一飛亷守照夀不延如庚辰命八月寅時張度泊命亷火守照日有辛巳戊午之不同一為進士侍郎始終得所一為監生至五旬方除州判過三載死在途又如庚辰三月未時星日泊命火羅為亷與日同度父夀未限貴又有三月寅時命坐室孛守火羅夾陽行房日度有夭者有夀者六十甲子中皆類此觀命者不可執一經泥一途當權通變化固㣲妙而難測也吾想夫午宫安命者火官為福為天地元總是太陰之力又如彭布政命己未正月亥時角木泊命孛守角木貴格若曰火命人如何不怕孛孛又是亷刼主只因五星髙強反吉論孛生命木故也一計羅截斷論跳出一星又嫌五殘守照經書甚有理但中間多有五殘守照而富貴者如白布政己亥四月二十九日子時危十二度泊命計羅辰戌滿一炁在斗木到大梁月孛胃土同躔諸星皆不可取年少登髙科得名為御史副使布政人品異常吾想月為天元祿主身度主起髙故也又如己亥七月卯時柳上泊命炁滿闗日月五星拱夾早妨父母出外無根發迹此格可准又有六月午時氐土安命五星日月南離趨拱此是貴格又如己亥八月十四日午時寅尾安命炁在斗月在危脱氐土身亡吾想月帶刃推不宜與火己亥對衝加金羅三方對照謂三方四正俱是煞故也一太乙抱鬼之説鄭先生曾論有秋殘夜半不可孤居之論吾觀貴命多有月孛同行或前或後或沉或晦亦在辰戌丑宫者不妨此又不可一槩而取一婦人命最難看有坐臨官馬者有坐咸池守照者身星清吉亦無它事雖發用一生多病若煞宫安身命終帶妨尅一女土泊命木守照不妨行限好即發用財福尅命之故一看太隂要𦂳李侍郎己巳十二月十四日亥時程副使十三日亥時俱翌火度泊命監生舉人出身諸星無異止是月躔畢度者一生為風憲官五十八致仕富貴極厚七十一死月躔井一者一生為部官五十九病六十死又如乙夘八月辛丑日申時金月在辰又有己亥日申時者二命俱坐虚日孛守照諸星一般太隂與木日在巳者早中進士御史侍郎尚書五子三子貴夀至六十發背死月在辰者為賢良保起居京官八品行房日氐土死其年四十四子不貴想日月為身命木為福財俱起入八煞故也一㸔八字要緊如時遇禄馬生旺貴人或坐時籍之勲皆好甲辰坐寅時尤妙一諸星拱西北惟一月順而當陽宫度俱强亦為大格行限弱則不能吉如壬申四月亥時在斗泊命壬戌日者月坐官禄坐殿官至一二品乙丑日者月坐福徳官至四品三品俱六十二行入午限死太陽酉孤立癸酉流年羊刄在命俱死于官得唐符卦氣在午結果甚美又加壬申正月巳時胃土泊命計羅己亥一孛滿用月與日在亥者登進士官至三品一子月在八煞者為生員無子三十五入刃病亡重在太隂不可不察一論拱北格如黄少卿甲戌年正月二十七日夘時生水木日守命在室度五十六限氏土死在途此火水之騐也又有同年月時二十八日生者作二月節注受在亥更妙月金同度在子格局拱北何以為守藝下賤人命也重在日之干支可見丁夘戊辰之有異不可執五星便斷貴賤若不精八字者須熟知人出處先人事有准方㫁後吉㐫庶可一火羅攻破日䑕者太陽得所大羅不得令或水土生人不忌一婦人丁巳正月申時生羊刃地雌在命孛為鋒亷㑹羅炁守夾井木命木又躔亢劒殺坐奴囚刑左右拱夾何以取用殊不知羅孛乃為我用星計為官魁夫主朝天太貴一品夫人造化壽八十之上八字有天月二徳故也一𤣥武引駕水在日前又值吉神化三元最妙太嵗兼之為上格四水泊命者取之在午未辰己夘上愈妙更要太陽得地有光一朱雀朝天或捧御單行得令為上格化三元最妙假如戌亥安命火守化為三元或木又為三元三元宫度相資為上格也一昴日安命刃火與日同躔木㐫若逢夜生秋冬不妨更得金水相扶亦主貴有壽一主命俱坐空亡名死窟加刄拱禍偏烈太嵗實之死於非命一日月引領諸星拱朝帝闕及文武兩班天地開明大貴格人世不多見一八字新舊相同者貴賤可擬只五星不同行限休咎出處有異一宫主尅度輕八殺不宜尅命官福主受尅限遇之不吉格局好雖不妨結果終不善一土計羅帶天雄羊刃夜生與月共度必有破相之疾太陽帶之亦然一丁酉十月丑時已翊泊命金守照月與火同度在軫十二三必是瞽者金能音樂月帶刃殺最不宜火逼故也一身命入八煞得令得時諸吉扶之貴格如丁夘生五月午時軫十度泊命羅計截斷寅申一金漏出在酉本美争奈火助煞土尅命水在鬼月帶刃同木坐禄旺見水得子妨妻三十五行井木净身為内使刄尾刼首見計不好總論一金得力故也假如戌亥子立命八煞守照更遇吉神大貴一諸星皆晦惟一福專權又化為催官或為三元又值禄旺之地不以晝夜為忌此是大格局雖有官禄從陽若在弱宫與命相戰皆不取用與身命相資者貴一犯三刑勾絞如夘刑子是子上泊命者八字日支又是子日者四旬外行夘限犯刑而死又如丑刑戌身命主起在戌上又日支是戌再行煞地必犯刑死若日干不相干犯行煞限或獄中死或生毒死守星善善死犯者終非是吉人一身命坐劒廉刃鋒無星壓者若星得局主發用貴顯限遇諸殺井沓重者亦主死于非命也行煞地或見㐫星火羅計孛發惡瘡死又如坐有吉星限遇煞交併亦主横死有壬申生人七月夘時星日泊命水輔陽在午唐符卦氣在局中年保為訓導癸酉流年六十二嵗限交室火見計六月被同僚打死檢屍此是羊刃與木對照于命申反刑亥加勾絞亡神貫索在亥炁月在丑羅土在己酉諸煞交攻故也一安命立身坐實占髙強且如六辛生人酉上泊命遇丁酉日最佳若身命福禄星好一二品格戌為刃處安命遇戌亥日㐫命坐日支為第一坐年月時者次之又如金生在已遇己巳日又是巳上安命文星旺官髙假如木旺在夘又遇夘日更安命在夘大貴之格一八字有合天月二徳命度身好大貴格或時帶天月二徳假如巳生人寅戌為天月二徳日月時有寅戌又相合為竒一八字天亡先論日干支要𦂳假如乙酉日便不宜庚辰時謂羊刃交合故也一四月泊命月起失經土計或羅孛帶殺夾拱夭亡金水雖好若帶重煞交拱亦不乆長大扺太隂只宜獨居夜深火金與月助光相宜帶天元中舉與孛同躔妨母若有坐位已不妨寒月不可同居一孛隨大後行大限忌之若四火安命或火命人生壽不長火旺尤可隔二三度主夭十六度外有援亦不妨一四木安命木土同度得躔又得生旺財帛擁進更財福二官有吉星扶為上格一四木安命水去輔日引駕更得吉曜相扶太嵗兼之為貴格一四土安命宜火得令獨居守照或去近土為上格再不宜近羅謂逢生不宜重見若火太燥為下格一四日泊命不宜木炁與日同躔日生人主夭若火羅日同躔只不益尊親於已不妨惟四日不怕飛亷火一帶華盖主聰明宦官帶華盖者多一妻坐遷移昭重婚之婦遷移主亦不宜守照一身命坐孤刼無吉星輔者結果欠好縱有福禄星享用到㡳不得力或死在外方不見妻子面煞宜空福禄吉星不宜空一看命格最要𦂳中間星辰有吉有㐫且如火羅計孛守辰戌丑未或月坐煞得地先貴後刑一命坐旺地行庫限不吉或死亡或剥官有援不妨一壬癸生人土為羊刃又為血支血忌若四水或月度安命土計尅度主血光灾如是五六月為飛亷必主夭又曰金命生人見土不甚㐫一坐天狗主無子如癸酉五月未時命坐角丁酉日者木月同度在室有子無官戊戌日者月躔壁水有官無子予想身度主朝天月為天狗得水光彩所以無子有官又有坐天狗者加火孛不吉照命限必然無子若得吉星者又當有子不可執一論之天狗在男女宫主受尅亦難子息一命坐處對生時時又帶煞主夭難養一太嵗填實惡星或在命限主灾犯者死一兩岐斷躔處立命天否則貧乏坐處不得安稳故也假如乙夘九月十四日戌亥時生人胃十一十四五度泊命殊不知戌亥時胃炁盡矣又入昴初管事最忌火羅為鋒若太陽坐煞或犯火羅此命十三先尅父十四後尅母交限斷躔故也二十八宿交界處有盈有虧須考究推斷一共命貧富壽夭不同吾觀時有八刻刻内有卒風暴雨隂晴晦朔是一箇時中有變兩三様天氣更有日月循行交宫過度明晦不一雖曰共時其刻有不同天時人身相合未免争差有彷彿者時刻相去不逺出處大不同者初未交界故也一經云官禄宫主忌限天雄有戊辰生人正月酉時張七度安命土守照月傷女土金日在危謂犯天雄如何行酉限官至三品入魁二品六十五升兵部尚書七十致仕盖木命人不畏土故也貌主黒一經云四月坐命惟土計可怕有辛夘生人十月十五戌時畢十三度坐命土月同躔在夘二十六中進士四十六二三品盡是水日在邜謂𤣥武引駕夜生人用身度昴日為主故也然土為八煞遷移退行與月有情母子先零丁被㐫人刼去後顯復性與母同居一男女宫見太隂并金水先得女子羅計在五宫主執拗性情多有尅害如逢木土太陽主先生男如夜值之恐難存養一孛在前月在後謂太乙抱鬼亥戌丑宫在下弦既晦之時名曰抱死鬼有乙酉生人九月三十日辰時尾初立命金水守照月角八亢初謂抱死鬼月又在亢八父早亡母賢夀至四十一行張限為御史四十八四品行至栁土三品其説何如葢水日馬官魁金水月孛俱旺樂孛為禄主故也術者不可不察一水氣相生夾命或帶官祿為上格一羅近太陽父凶殊不知又有夀考者謂首星捧日夜生者吉盖夜日無光喜火羅故也一經云八煞宫兼閑極身命所臨皆不取楊監生甲辰三月戌時亢金坐命土資亢大守照為天池人三亢有學四十四脫鬼金死在途無子件件無成况金為㢘鋒夜土木愈凶又甲辰七月巳時亢坐命土資亢木在角金拱日貧乏之人也如殿駕馬者不可泥此論一對宫星為大耗見之主服耗如我命女度土見日大耗加官如李㢘使命土見日升三品死六人一身命起死敗地行衰限破家行限見敗星或天地耗又對宫大耗皆耗財一火羅計孛中居子午與四餘並論一殺星坐命不喜殺星來生他主夭如甲辰生人亢度立命金帶劔鋒或飛㢘最不宜土來亢上葢其為白虎的殺若身吉主貴若火羅孛犯身主賤四十五行鬼金煞則死一命度帶刼刅㢘的耗符殺併重又遇生星其勢愈惡行殺限夭亡如癸未五六月生人女土安命者是也一四水安命遇金帶長生貴禄守照或生水大吉愈老愈徤如癸酉生人金帶鋒㢘守照雖生貴水亦夭一官命二宫㑹注受斗杓卦殿生旺木吉然本原受虧名利虚花百無一成看楊知縣戊戌命便知不吉主夭子不成人一水為孤刼計為雄刄夾日主胎中妨父刄雌與太隂合着度上即妨母一八字忌惡日生經云倉庫化作塵無格者凶時亦然吾觀大富貴命多有十惡日生者此不可准一三竒格主者貴曾觀不富不貴命亦有甲戌庚子丙丁者意日時上起者准一官星最怕天雄如孫尚書戌辰生張立命土守照金日月在子天雄不忌一行限遇忌星當亡若限主忌曜居旺樂廟止是病再延四年或一二年如癸亥生人命在心水土在刼尾七十一病幾死又踰十四行昴度方死其類是也一流年星如井木安命木入亢婁火帶煞入命宜謹身節欲一土躔牛居垣而泄氣木躔斗入廟而退行得失相半一奴入官宫煞臨命主人事虚花一木土同度入子限便有耗服一行限在子流木氣在甲或羅火照虚凶不吉一婁金行斗木非傷人則妨職一星對照如金在畢九度行限尾九度其年應尅害若奎木安命其年不安如壁水安行生我吉一日月蝕時生子主夭或瞽遇天神威怒雷震風烈之時生子大不利到老有非常之禍一月兼身命若起在孤刼㢘刄縱有生旺扶助亦主夭折一刄刼首尾交界兩岐立命主夭夜土日火守照謂五殘星非貧則天一合刼局最妙縱度主失經也不妨福禄逢空遇吉神止半力惟貴禄要合凶神不宜合一命度主或身主為天元若守照或起得所為文學科名造化一甲子甲辰甲申生人丙寅時庚寅庚午庚戌生見壬申時主大貴顯一四金泊命與水守照金助水力乏則不能剋木為財行四木度不利餘倣此一看命令星最要𦂳如冬令金水守照孤貧與身同躔亦然一孛隨火後最重若在前隔三四度亦夭出十度之外有援不妨一八字一旬内合六條戌辰與癸酉合年與月合甲戌己邜合丙戌辛邜合戊戌癸邜合甲辰己酉合丙辰辛邜合年與月合日與時合時合為上年合次之謂之君臣慶㑹格主大貴一八字日時帶天月徳如三月壬九月丙運行丙壬有官者升遷無官封贈殁後亦然若格不好雖天月徳也夭凶一諸星背行亦有𨼆匿而不知顯者如己亥生人四月子時危十二度命坐計羅辰戌截炁在斗諸曜皆西没之地孛隨月後俱傷於胃木又大梁行限似不可取此人二十五中進士御史三十四五副使布政四十四五侍郎尚書葢身命月為天元與孛在胃正旺之地火金為官魁前後引從此大格也五十七行氐度死一四火度命水孛逢生對照火本弱水强難遇但金月火不盡明主晦一四水度命忌土孛對照又看帶煞輕重如何惟官魁喜照命限兼身命不宜羅土帶煞相親也一如命躔四木度甲乙生人又属木納音又木純作木論春令晝生尤妙餘倣此一羅計躔日度太陽飛入神煞或在隂宫父早亡如犯月度天隂飛入惡煞或在陽宫母早喪羅怕頭忌帶刄孛怕尾忌帶浮沉刼耗的炁怕冲忌掌飛㢘計怕怒忌為刄雄依此倣之一日為父月為母務要光明主父母富貴不宜陽刄雄雌之位亦不宜四餘掩蝕主父母傷殘一身命躔隂度者主次胎生又晝用日躔夜用月躔陽度者一三五七九隂度者二四六八十是也宫身度三主俱躔陽度者主富貴謂之三陽開泰格男純陽女純隂為妙一日月㑹貴人之地無凶星破者為上日月夾貴乃以尊貴斷之一日月拱斗為上格人命罕逢之一日月拱夾太嵗大吉夾嵗殿亦吉一日月拱夾大小耗宫必貧賤有始無終之人一日月拱夾天雄地雌再加惡煞得志似虎添翼草䖝出脚若守命得用主有威權一日月拱夾的煞主其人一生無後身若飄萍一日月拱夾陽刄宜武職刄在命又喜日月拱夾大權武貴驚人之要勢士人不祥女命主産亡一晝生火勝於木不忌水字同道夜則水勝於火不宜見水再行水度必夭折一命居兩岐者非過房出祖必自移根換葉一行運限者切忌元流二冲尤怕流行尅戰爵禄之人要冲禄馬遷官進職事必有動一運限在神煞之宫尅戰之鄉最怕刑冲壓逼如庚子生人運限在巳太嵗在亥謂之冲運限在邜太嵗在子謂之刑運限到辰太嵗在巳謂之壓運限到巳太嵗在辰謂之逼若見此數再見忌宿定主災殃星命溯源卷四
