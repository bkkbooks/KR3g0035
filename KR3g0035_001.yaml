body:
  text: 星命溯源卷一通𤣥遺書先生姓張名果生堯之丙丁至唐猶存𤣥宗召試其術神之因賜號通𤣥先生五星論太上洪荒之世清濁未分混沌如卵精神盛極著而成形則有人矣两儀四象三才五行備不知體生不知用且隂陽得位風雷鼓舞化生萬物邇莫能知逮夫聖人之生辯龍馬之圖而立極因神龜之文以用事始知五星光燦羣曜熒輝遂别辰宿於乾坤配人身於天地灾祥休咎因是言之夫人之生育於乾坤覆載於坎離大無不周小無不具天干生而氣聚崇勲地支成而元居嵗駕故將宫命以定三元審元辰而言九事生煞作吉㐫之根向背為貴賤之本先看明暗升沉順逆衰旺掩蝕衝制失次入垣次看朝拱夾輔分㑹引從漏截守岐方以格局考評貴賤夫隂陽拱夾得地是豈凡夫如逢經緯驛馬相扶更㑹斗貴印符侍從必獲萬鍾之禄八位之權失位失時亦作空門髙貴客俗縁不斷決作見紫見緋人福禄夾身三元總㑹無傷無耗不是貧才食禄相隨田財俱旺富可言其無比田可連於阡陌若值四耗侵凌八虚空陷必主破祖㤀家尤忌傷財刼盜奔忙勞碌没齒貧窮計羅乃首尾之星作攔截之用中分五五可分日東月西前後三三更取魁元引從己亥為乾坤定位平分諸曜拱天庭寅申乃隂陽兩闗包裹衆星朝帝闕辰戌丑未號曰首尾横天子午夘酉名曰隂陽居正位例置能分輕重制向又怕失躔身命得地福禄難量左右有情功名莫比要知火羅計孛禍福難言守四維占四正者始發權則如雷電終害己利若鋒芒此類惟宜獨行怕相混雜順之乃吉逆之為凶日月體君后之象要升入于坎離之中朝子午暮夘酉看垣殿之正偏分兩班朝帝闕辨隂陽之向背晝生日而金水輔從夜誕月而火羅侍衛合此格者鳳陛髙遷龍墀蚤入至若五曜連珠二星合璧載天覆地出乾入坤文武兩班君臣慶㑹是皆梁棟之材廟堂之器守一空一居三隔三太乙抱蟾于酉未計都朝斗於丑牛斯乃文朝秀士鐘鼎竒英水星伴月向未巳為朝主背君計羅火孛聚丑亥乃朝天拱斗此宿本作㐫神面尊反為上客切見天地清寧日月麗正羣星朝北衆曜拱南順必異貌竒人逆則窮途儒士面南坐北南人必貴北人富面北坐南南人必富北人貴是乃風土厚薄之相宜地勢使之必然也復有天地開明山澤通氣水火既濟風雷鼓舞此則名為虚拱不可更漏别宫須要日月分階亦宜計羅横截方為上格如是乾坤否塞風雷相薄水火相射山澤沉埋此人飄風無倚破蕩田産貴無傷富無耗世代敷榮身主弱命主羸始終偃蹇星逢格局便論垣窠更不拘其神煞星専時令須分體用方可斷其榮枯星徤身強官而富富而夀格髙星困苗不秀秀不實是乃星躔失度若斯當問人生分野而通之更詳正闗闔拱闢拱有官禄而無用宫乃蔵其刃雄或刑囚而不妨殺不加于二主盖吉曜失時吉而不吉凶星得地㐫莫能㐫身命官福最喜三元左經右緯須防斗柄若引從吉則内貴乎空持挈凶則外喜乎善俾夾者吉而拱者㐫主多榮而少辱拱者善而夾者凶合一成而一敗盖一曜司權滿用得拱為先羣星守照多端合格為上前後朱雀𤣥武而驛馬來扶左右青龍白虎而經緯夾拱四神來往環衛命主三方七政循行朝拱身宫一位必主貴為天子富有四海之尊官魁夾命帶龍虎則廊廟良材禄馬扶身㑹三元乃朝廷宰輔對馬坐貴皆是騰達之人向馬就禄必作榮華之士木臨獅子居官不明計入三陽有禄莫食子午乃聖人之端門煞神莫入辰戌是小人之羅網天乙不臨閑極髙明命本弱兄弟不足奴僕明徤身居困卑小侵陵日食朔月食望喪明孤哀氣遇羅水逢孛緇黄娼妓文魁催官入于格局名當一舉而成的宫隔宿翫於遊行身必三遷未定火逼金龍角受生亢為遭毒水渰玉犬婁没弱胃不受傷爍爍陽光大羅晝忌娟娟月色土計夜防小耗大耗值天地耗忌守田財官符死符見嵗月符怕臨身命若非獄訟損己亦主博戲亡家勾絞㑹凶刼亡併煞輕則風癆疾患重則斬絞徒流亡神的殺㑹咸池則傷夀損禄飛亷劍鋒帶官符而投詞損財相生相順者輕相尅相刑者重血刃血支隄防金孛作灾殃天厄天刑最怕火羅興惡孽男值傷痔癰疽女犯氣傷崩漏浮沉若逢土計非溺水必犯巫醫飛亷或遇金羅非干戈則當暴死的殺聚于二刃遇刑囚必主横胎劍絳㑹於四㐫遇衝傷必患惡血天狗絶嗣孤寡無妻徳星坐於崇勲魁刑權重爵禄居于嵗駕伏煞官髙煞金為刃休逢刼木為灾難避天雄地雌怕居禄位天耗地耗切忌財鄉論煞論刑煞重而刑不可救說凶說吉凶多不可作吉言華盖紫氣是良辰天乙䕃星為善曜三方有氣必須叅詳四角無星未為㐫斷婦人以財福為重官星可作天元只宜坐貴不宜衝惟忌見滛又見合桃花金水坐子夘是無禮之人金孛咸池騎四馬為勞瘵之鬼縱有朱唇粉黛難免送舊迎新須是雪月風花不無飄蓬落魄此則舉其綱領更探𨼆而索微要知造化𤣥機細騐天時得失天元玉册歴象無差細辨盈虚貴賤定矣四時論切以三冬之木遇水而寒九夏之土逢火而燥金埋土而反晦土渾水而致濁無根之木遇惡水而漂泛東西受制之土見猛水而崩潰四出冬金遇月飢寒刺骨春金見月淡薄無成大逢月朗則無權金得火明而煥發寒月最喜扵陽夏火不妨見月未垣安命太陽行限則柔而能剛星度為元太隂司用則懦而無力盛夏之大何須木炁生扶六月之水最怕火日枯涸夏金逢日銷鑠無聊秋木逢陽凋零何補戌垣之火取用與夘垣不同酉宫之金行限與辰宫有異冬水喜扵南奔戍火忌於發露冬春之木見日則為向陽冰凍之土㑹火始能發用月圓火焰奈争鬬而無成冰凍金寒縱相生而不發寒土何生金之有秋水非滋木之時辰酉坐命土犯月而尤佳夘戌為垣孛步蟾而反害殘晦之月見火増煇剛燥之土遇水滋潤諸星皆退主星獨順乃中流砥柱之人羣曜皆衰一星有用亦獨步軒昻之士土在子木在午似有衝而無害命居申土在亥行此限以何妨婁乃金石之火觸日而發箕乃濛泉之水見金不清惟参軫之議論不殊與亢星之取用歸一丑宫安命不可以木為刑囚星栁為垣亦不可以木為難曜豈不有水中之火火中之金金垣之木木垣之土議論萬殊取用不一冬水為命太陽行限財不足而福有餘春金作主土星發用彼無力而我何藉論星先要論時論氣無過論理火本畏水已宫翼火為登殿土本怕木寅宫艮土反長生造化貴其適用術士妙在變通過猶不及泥在太拘此論發先聖之秘奥後學必寳而敬之切勿亂傳真金愛䕶與吾學問通𤣥敬依天理而謹言之也玉衡經晝生從日喜居六陽之宫夜生從月利見六陰之地衆星亂煞禀陽尊不見施威三日逢刑總月光不能為福若論陰陽須看晝夜背太陽於父有撼背太陰於母有虧五星俱要比和但以得時為貴四餘不宜衝突惟喜獨行為佳伏逆無光順行有氣金星守命好色而主清髙木徳臨垣剛毅而懷惻隐水如守命多學少成火若當權恣行酷毒沉謀熟慮為縁土入命宫巧筭多機葢是計居垣位獨孛則為人慳吝單羅則賦性貪婪紫氣照臨必主伶俐雖然星辰如此又看月令若何女命陶到木躔防夫害子男命限到月躔招妻納妾水孛如守田財難招祖業火羅如臨父母㓜失慈親命主逢陽終富貴安身傍母必尊榮九宫遇孛終身漂泊無拘十地逢羅年少誇豪逞訟羅計若居子午縱尅而有情木土偏愛陽宫雖戰而無損彗星晝見女人必以為殃天乙夜行男命見之反尅年月日時四生值殺立見刑徒官魁爵禄四主髙強自然榮顯金月互垣必有立成之分隂陽失位沒齒貧困之人主星居于母地必傍貴而成家母星飛入命垣多因妻而致富木居獅子居官不能享官計入三陽有禄不沾寸禄水喜順而不喜逆土愛煖而不愛寒以元合食論人之享用以官魁爵定人之前程最喜者四角之有星所忌者三方之無曜馬臨官禄出祖成家禄在妻宫因妻致富男人命居子午必強狠而専權女人命立㢲乾必滛冶而誇色坐貴不宜沖貴見合不宜見刑立身合論馬元失管則徒然奔走聚財則觀財庫無守則必致敗亡不須輕用閑奴此等須當我用煞不宜真真難磨滅禄不宜破破則貧窮孤而加寡妻子難為空以加亡利名難遂刑不宜戰戰則必刑三刑帶戰必然刑害合不宜沖沖則必破合還沖破作事無成論刑必論煞刑煞重而難當論官必論魁官魁顯而清貴既叅官魁本宿當以太陽相叅雖論刑煞星辰合以天煞互論兩煞夾垣須破相三刑臨已必傷殘身命最喜入官坐僕坐閑何所用日月不宜夾煞夾禄夾貴以為榮子午為聖人端坐之宫諸煞莫入辰戌為小人惡弱之地天乙莫臨暗金可畏若臨命夭折無疑煞火無情若居煞凶惡難免日月若居華盖僧道之流禄馬如陷空亡巫醫之士桃花帶合男女皆為無禮之滛隔角逢孤嗣續皆是過房之子坐禄向馬乃利名顯達之人對禄坐貴亦文章騰達之士木羅㑹舍喜入寅宫水計相刑怕入巳位刼頭乃非活路刄末最是凶闗衆凶作黨有不已之戰争二母爭權乃太過于孤息孤日臨於命限勤苦勞心一月單行官禄精寧可愛婦人専以性宫為重男人當以八煞為權面目傷殘刑囚不宜傷相貌心神漂泊水孛最忌入遷移對照逢羅㛰姻反掌五官逢孛男女虚花一主臨財財必豐厚兩強戰尅田宅動摇命卑閑徤兄弟有争鬭之風主弱奴強奴婢有侵凌之患福星喜臨垣禄主宜鎮位以木炁金水為君子以水羅計孛為小人十二煞神仔細推詳三百六十吉㓙可考隂陽主巽至老耳目聰明火孛臨坤未免腰背屈曲羅居午位眼必無光水入寅宫咽喉壅塞鼻頭帶赤火孛而守申宫臉面委黄土計而居辰位計臨申位面上有虧羅入命宫鬍鬚可騐孛羅到酉心氣徃來孛羅沖心風疾難禁孛羅居于亥子臀犯瘡疽金火戰於辰酉肺心咳𠻳羅逆行而不順多犯血光火若退而遲留難堪酒痢更若孛星有黨血上加膿那堪土宿來臨痔而帶疾木到巽而見煞左手拘攣炁入寅而逢刑脚腿虚腫要觀疾病先論陷星吉凶了然易如反掌五命之書一理可通秘以受人韞匵蔵諸星命溯源卷一
